# Prometheus Configuration for Homelab
# Includes scrape configs for all services and alerting
# https://prometheus.io/docs/prometheus/latest/configuration/configuration/

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: homelab
    env: production

# Alerting configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

# Rule files for alerting
rule_files:
  - /etc/prometheus/rules/*.yml

# Scrape configurations
scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
    metrics_path: /metrics

  # Alertmanager
  - job_name: 'alertmanager'
    static_configs:
      - targets: ['alertmanager:9093']

  # Node Exporter - Host metrics
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']

  # Loki metrics
  - job_name: 'loki'
    static_configs:
      - targets: ['loki:3100']
    metrics_path: /metrics

  # Promtail metrics
  - job_name: 'promtail'
    static_configs:
      - targets: ['promtail:9080']
    metrics_path: /metrics

  # Vector metrics (if using Vector)
  - job_name: 'vector'
    static_configs:
      - targets: ['vector:8686']
    metrics_path: /metrics

  # Grafana metrics
  - job_name: 'grafana'
    static_configs:
      - targets: ['grafana:3000']
    metrics_path: /metrics

  # ============================================
  # Media Stack Services (if they expose metrics)
  # ============================================
  
  # Tdarr metrics
  - job_name: 'tdarr'
    static_configs:
      - targets: ['tdarr:8266']
    metrics_path: /metrics

  # ============================================
  # Docker daemon metrics (optional)
  # Requires Docker daemon configured with --metrics-addr
  # ============================================
  # - job_name: 'docker'
  #   static_configs:
  #     - targets: ['host.docker.internal:9323']

