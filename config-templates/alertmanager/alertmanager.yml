# Alertmanager Configuration
# Keep this minimal by default. Add receivers and custom routes only when you actually use alerting.
# https://prometheus.io/docs/alerting/latest/configuration/

global:
  resolve_timeout: 5m

route:
  receiver: default
  group_by:
    - alertname
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h

receivers:
  - name: default
