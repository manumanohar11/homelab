# Loki Alerting Rules for Homelab
# These rules are evaluated by Loki and sent to Alertmanager
# https://grafana.com/docs/loki/latest/rules/

groups:
  # ============================================
  # Container Error Alerts
  # ============================================
  - name: container-errors
    interval: 1m
    rules:
      - alert: HighContainerErrorRate
        expr: |
          sum by (container) (
            count_over_time({job="docker"} |~ "(?i)(error|err|fatal|panic|exception)" [5m])
          ) > 50
        for: 5m
        labels:
          severity: warning
          category: container
        annotations:
          summary: "High error rate in container {{ $labels.container }}"
          description: "Container {{ $labels.container }} has logged more than 50 errors in the last 5 minutes."

      - alert: CriticalContainerErrors
        expr: |
          sum by (container) (
            count_over_time({job="docker"} |~ "(?i)(fatal|panic|critical)" [5m])
          ) > 5
        for: 2m
        labels:
          severity: critical
          category: container
        annotations:
          summary: "Critical errors in container {{ $labels.container }}"
          description: "Container {{ $labels.container }} has logged critical/fatal/panic errors. Immediate attention required."

      - alert: ContainerOOMKilled
        expr: |
          count_over_time({job="docker"} |~ "(?i)(out of memory|oom|killed process|memory allocation failed)" [5m]) > 0
        for: 1m
        labels:
          severity: critical
          category: container
        annotations:
          summary: "Container OOM detected"
          description: "A container appears to have been killed due to out-of-memory condition."

      - alert: ContainerRestartLoop
        expr: |
          sum by (container) (
            count_over_time({job="docker"} |~ "(?i)(starting|restarting|initialized)" [15m])
          ) > 5
        for: 5m
        labels:
          severity: warning
          category: container
        annotations:
          summary: "Container {{ $labels.container }} may be restart looping"
          description: "Container {{ $labels.container }} has restarted more than 5 times in the last 15 minutes."

  # ============================================
  # Media Stack Specific Alerts
  # ============================================
  - name: media-stack-alerts
    interval: 1m
    rules:
      - alert: ArrServiceConnectionError
        expr: |
          sum by (container) (
            count_over_time({container=~"radarr|sonarr|lidarr|readarr|prowlarr"} |~ "(?i)(connection refused|connection failed|unable to connect|timeout)" [5m])
          ) > 10
        for: 5m
        labels:
          severity: warning
          category: media
        annotations:
          summary: "{{ $labels.container }} connection issues"
          description: "{{ $labels.container }} is having connection issues. Check network and dependent services."

      - alert: DownloadClientError
        expr: |
          sum by (container) (
            count_over_time({container=~"qbittorrent|transmission|nzbget|sabnzbd"} |~ "(?i)(error|failed|unable)" [5m])
          ) > 20
        for: 5m
        labels:
          severity: warning
          category: downloads
        annotations:
          summary: "Download client {{ $labels.container }} errors"
          description: "Download client {{ $labels.container }} is logging errors. Check VPN connection and disk space."

      - alert: VPNConnectionLost
        expr: |
          count_over_time({container="gluetun"} |~ "(?i)(connection lost|disconnected|tunnel down|no connectivity)" [2m]) > 0
        for: 1m
        labels:
          severity: critical
          category: vpn
        annotations:
          summary: "VPN connection lost"
          description: "Gluetun VPN container has lost connectivity. Download traffic may be exposed!"

      - alert: TranscodingErrors
        expr: |
          sum by (container) (
            count_over_time({container=~"tdarr|plex|jellyfin"} |~ "(?i)(transcode.*error|encoding failed|ffmpeg.*error)" [10m])
          ) > 5
        for: 5m
        labels:
          severity: warning
          category: media
        annotations:
          summary: "Transcoding errors in {{ $labels.container }}"
          description: "{{ $labels.container }} is experiencing transcoding failures."

      - alert: DatabaseError
        expr: |
          sum by (container) (
            count_over_time({job="docker"} |~ "(?i)(database.*error|db.*error|sqlite.*error|postgres.*error|mysql.*error)" [5m])
          ) > 5
        for: 5m
        labels:
          severity: warning
          category: database
        annotations:
          summary: "Database errors detected in {{ $labels.container }}"
          description: "Container {{ $labels.container }} is logging database errors."

  # ============================================
  # Security Alerts
  # ============================================
  - name: security-alerts
    interval: 30s
    rules:
      - alert: SSHBruteForceAttempt
        expr: |
          sum(count_over_time({job="auth"} |~ "Failed password" [5m])) > 10
        for: 2m
        labels:
          severity: warning
          category: security
        annotations:
          summary: "Possible SSH brute force attack"
          description: "More than 10 failed SSH login attempts in the last 5 minutes. Consider blocking the source IPs."

      - alert: SSHBruteForceAttackCritical
        expr: |
          sum(count_over_time({job="auth"} |~ "Failed password" [5m])) > 50
        for: 1m
        labels:
          severity: critical
          category: security
        annotations:
          summary: "Active SSH brute force attack"
          description: "More than 50 failed SSH login attempts in the last 5 minutes. Immediate action required!"

      - alert: SuspiciousAuthActivity
        expr: |
          count_over_time({job="auth"} |~ "(?i)(invalid user|illegal user|break-in attempt|bad protocol)" [5m]) > 5
        for: 2m
        labels:
          severity: warning
          category: security
        annotations:
          summary: "Suspicious authentication activity detected"
          description: "Multiple suspicious auth events detected. Review auth.log for details."

      - alert: RootLoginDetected
        expr: |
          count_over_time({job="auth"} |~ "Accepted.*(root@|for root from)" [1m]) > 0
        for: 0m
        labels:
          severity: warning
          category: security
        annotations:
          summary: "Root login detected"
          description: "A root login was detected. Verify this was authorized."

      - alert: UnauthorizedContainerAccess
        expr: |
          sum by (container) (
            count_over_time({job="docker"} |~ "(?i)(401|403|unauthorized|forbidden|access denied)" [5m])
          ) > 20
        for: 5m
        labels:
          severity: warning
          category: security
        annotations:
          summary: "High unauthorized access attempts on {{ $labels.container }}"
          description: "Container {{ $labels.container }} is receiving many unauthorized access attempts."

  # ============================================
  # System Alerts
  # ============================================
  - name: system-alerts
    interval: 1m
    rules:
      - alert: DiskSpaceWarning
        expr: |
          count_over_time({job=~"system|docker"} |~ "(?i)(no space left|disk full|low disk space|out of disk)" [5m]) > 0
        for: 1m
        labels:
          severity: critical
          category: system
        annotations:
          summary: "Disk space critically low"
          description: "System is reporting disk space issues. Free up space immediately."

      - alert: HighSystemLoad
        expr: |
          count_over_time({job="system"} |~ "(?i)(load average.*[0-9]{2,}\\.[0-9]|high load)" [5m]) > 0
        for: 5m
        labels:
          severity: warning
          category: system
        annotations:
          summary: "High system load detected"
          description: "System load is abnormally high. Check resource usage."

      - alert: KernelErrors
        expr: |
          count_over_time({job="system"} |~ "(?i)(kernel.*error|kernel panic|oops|bug:|segfault)" [5m]) > 0
        for: 1m
        labels:
          severity: critical
          category: system
        annotations:
          summary: "Kernel error detected"
          description: "Kernel-level errors have been detected in system logs."

  # ============================================
  # Service Health Alerts
  # ============================================
  - name: service-health
    interval: 2m
    rules:
      - alert: NoLogsFromContainer
        expr: |
          (count by (container) (count_over_time({job="docker"} [30m]))) 
          unless 
          (count by (container) (count_over_time({job="docker"} [5m])))
        for: 10m
        labels:
          severity: warning
          category: health
        annotations:
          summary: "No recent logs from container {{ $labels.container }}"
          description: "Container {{ $labels.container }} has not logged anything in 10+ minutes. It may be hung or stopped."

      - alert: HealthCheckFailures
        expr: |
          sum by (container) (
            count_over_time({job="docker"} |~ "(?i)(health ?check.*fail|unhealthy)" [5m])
          ) > 3
        for: 5m
        labels:
          severity: warning
          category: health
        annotations:
          summary: "Health check failures for {{ $labels.container }}"
          description: "Container {{ $labels.container }} is failing health checks repeatedly."
