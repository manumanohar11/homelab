# Grafana Datasources Provisioning
# Auto-configures Loki and Prometheus on first startup
# https://grafana.com/docs/grafana/latest/administration/provisioning/#datasources

apiVersion: 1

datasources:
  # Prometheus - Metrics
  - name: Prometheus
    type: prometheus
    uid: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false
    jsonData:
      timeInterval: "15s"
      httpMethod: POST

  # Loki - Logs
  - name: Loki
    type: loki
    uid: loki
    access: proxy
    url: http://loki:3100
    editable: false
    jsonData:
      maxLines: 1000
      timeout: 60
      derivedFields:
        # Link container logs to Prometheus metrics
        - datasourceUid: prometheus
          matcherRegex: 'container="([^"]+)"'
          name: container
          url: '/explore?left=["now-1h","now","Prometheus",{"expr":"container_cpu_usage_seconds_total{name=\"$${__value.raw}\"}"}]'

  # Alertmanager - For Grafana unified alerting
  - name: Alertmanager
    type: alertmanager
    uid: alertmanager
    access: proxy
    url: http://alertmanager:9093
    editable: false
    jsonData:
      implementation: prometheus
