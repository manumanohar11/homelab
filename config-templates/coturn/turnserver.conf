# Coturn configuration template for home-only Jitsi relay.
# This file is rendered at container start so `external-ip` tracks `rtc.${DOMAIN_NAME}`.

use-auth-secret
static-auth-secret=__JITSI_TURN_CREDENTIALS__
realm=__JITSI_MEDIA_PUBLIC_HOSTNAME__
server-name=__JITSI_MEDIA_PUBLIC_HOSTNAME__

fingerprint
listening-ip=0.0.0.0
external-ip=__JITSI_MEDIA_PUBLIC_IP__
listening-port=__JITSI_TURN_PORT__
min-port=__JITSI_TURN_MIN_PORT__
max-port=__JITSI_TURN_MAX_PORT__

no-cli
no-tls
no-dtls
stale-nonce=600
no-multicast-peers
no-loopback-peers
simple-log
