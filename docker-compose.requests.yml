# ~/media-stack/docker-compose.requests.yml
# Contains media request services (Overseerr, Jellyseerr).
# Note: These are most useful when the `arr` profile is enabled.

x-common-env: &common-env
  PUID: ${PUID}
  PGID: ${PGID}
  TZ: ${TZ}

x-service-defaults: &service-defaults
  restart: unless-stopped
  init: true
  security_opt:
    - no-new-privileges:true
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "3"

x-healthcheck-defaults: &healthcheck-defaults
  interval: 30s
  timeout: 10s
  retries: 3
  start_period: 30s

x-resources-small: &resources-small
  deploy:
    resources:
      limits:
        cpus: '0.5'
        memory: 256M
      reservations:
        memory: 64M

x-resources-medium: &resources-medium
  deploy:
    resources:
      limits:
        cpus: '1'
        memory: 512M
      reservations:
        memory: 128M

services:
  # Overseerr - Plex request platform (requires *arr stack)
  overseerr:
    <<: [*service-defaults, *resources-medium]
    image: lscr.io/linuxserver/overseerr:latest
    container_name: overseerr
    init: false
    environment:
      <<: *common-env
    volumes:
      - ${DOCKER_BASE_DIR}/overseerr:/config
    networks:
      - media-stack
    ports:
      - "5055:5055"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5055/api/v1/status"]
      <<: *healthcheck-defaults
      start_period: 30s
    labels:
      - "com.centurylinklabs.watchtower.enable=false"
      - "pangolin.public-resources.overseerr.name=Overseerr"
      - "pangolin.public-resources.overseerr.protocol=http"
      - "pangolin.public-resources.overseerr.full-domain=${OVERSEERR_SUBDOMAIN:-overseerr}.${DOMAIN_NAME:-localhost}"
      - "pangolin.public-resources.overseerr.auth.sso-enabled=true"
      - "pangolin.public-resources.overseerr.targets[0].hostname=overseerr"
      - "pangolin.public-resources.overseerr.targets[0].method=http"
      - "pangolin.public-resources.overseerr.targets[0].port=5055"
      - "pangolin.public-resources.overseerr.targets[0].healthcheck.hostname=overseerr"
      - "pangolin.public-resources.overseerr.targets[0].healthcheck.port=5055"
      - "pangolin.public-resources.overseerr.targets[0].healthcheck.path=/api/v1/status"
      - "pangolin.public-resources.overseerr.targets[0].healthcheck.status=200"
    profiles:
      - requests

  # Jellyseerr - Jellyfin request platform (requires *arr stack)
  jellyseerr:
    <<: [*service-defaults, *resources-medium]
    image: fallenbagel/jellyseerr:latest
    container_name: jellyseerr
    environment:
      TZ: ${TZ}
      LOG_LEVEL: info
    volumes:
      - ${DOCKER_BASE_DIR}/jellyseerr:/app/config
    networks:
      - media-stack
    ports:
      - "5056:5055"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5055/api/v1/status"]
      <<: *healthcheck-defaults
      start_period: 30s
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
      - "pangolin.public-resources.jellyseerr.name=Jellyseerr"
      - "pangolin.public-resources.jellyseerr.protocol=http"
      - "pangolin.public-resources.jellyseerr.full-domain=${JELLYSEERR_SUBDOMAIN:-jellyseerr}.${DOMAIN_NAME:-localhost}"
      - "pangolin.public-resources.jellyseerr.auth.sso-enabled=true"
      - "pangolin.public-resources.jellyseerr.targets[0].hostname=jellyseerr"
      - "pangolin.public-resources.jellyseerr.targets[0].method=http"
      - "pangolin.public-resources.jellyseerr.targets[0].port=5055"
      - "pangolin.public-resources.jellyseerr.targets[0].healthcheck.hostname=jellyseerr"
      - "pangolin.public-resources.jellyseerr.targets[0].healthcheck.port=5055"
      - "pangolin.public-resources.jellyseerr.targets[0].healthcheck.path=/api/v1/status"
      - "pangolin.public-resources.jellyseerr.targets[0].healthcheck.status=200"
    profiles:
      - jellyfin

  # Notifiarr for unified notifications across *Arr apps
  notifiarr:
    <<: [*service-defaults, *resources-small]
    image: golift/notifiarr:latest
    container_name: notifiarr
    hostname: notifiarr
    environment:
      TZ: ${TZ}
      DN_API_KEY: ${NOTIFIARR_API_KEY:-}
    volumes:
      - ${DOCKER_BASE_DIR}/notifiarr:/config
      - /var/run/utmp:/var/run/utmp:ro
    networks:
      - media-stack
    ports:
      - "5454:5454"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5454"]
      <<: *healthcheck-defaults
      start_period: 30s
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
      - "pangolin.public-resources.notifiarr.name=Notifiarr"
      - "pangolin.public-resources.notifiarr.protocol=http"
      - "pangolin.public-resources.notifiarr.full-domain=${NOTIFIARR_SUBDOMAIN:-notifiarr}.${DOMAIN_NAME:-localhost}"
      - "pangolin.public-resources.notifiarr.auth.sso-enabled=true"
      - "pangolin.public-resources.notifiarr.targets[0].hostname=notifiarr"
      - "pangolin.public-resources.notifiarr.targets[0].method=http"
      - "pangolin.public-resources.notifiarr.targets[0].port=5454"
      - "pangolin.public-resources.notifiarr.targets[0].healthcheck.hostname=notifiarr"
      - "pangolin.public-resources.notifiarr.targets[0].healthcheck.port=5454"
      - "pangolin.public-resources.notifiarr.targets[0].healthcheck.path=/"
      - "pangolin.public-resources.notifiarr.targets[0].healthcheck.status=200"
    profiles:
      - notifiarr
