# ~/media-stack/docker-compose.documents.yml
# Contains document and knowledge services: Paperless-ngx, Stirling-PDF, Karakeep, and Docmost.

x-common-env: &common-env
  PUID: ${PUID}
  PGID: ${PGID}
  TZ: ${TZ}

x-service-defaults: &service-defaults
  restart: unless-stopped
  init: true
  security_opt:
    - no-new-privileges:true
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "3"

x-healthcheck-defaults: &healthcheck-defaults
  interval: 30s
  timeout: 10s
  retries: 3
  start_period: 30s

x-resources-small: &resources-small
  deploy:
    resources:
      limits:
        cpus: '0.5'
        memory: 256M
      reservations:
        memory: 64M

x-resources-medium: &resources-medium
  deploy:
    resources:
      limits:
        cpus: '1'
        memory: 512M
      reservations:
        memory: 128M

x-resources-large: &resources-large
  deploy:
    resources:
      limits:
        cpus: '2'
        memory: 2G
      reservations:
        memory: 512M

services:
  paperless-broker:
    <<: [*service-defaults, *resources-small]
    image: redis:8-alpine
    container_name: paperless-broker
    volumes:
      - ${DOCKER_BASE_DIR}/paperless/redis:/data
    networks:
      - media-stack
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      <<: *healthcheck-defaults
    profiles:
      - paperless

  paperless-db:
    <<: [*service-defaults, *resources-small]
    image: postgres:18-alpine
    container_name: paperless-db
    environment:
      POSTGRES_DB: ${PAPERLESS_DB_NAME:-paperless}
      POSTGRES_USER: ${PAPERLESS_DB_USER:-paperless}
      POSTGRES_PASSWORD: "${PAPERLESS_DB_PASSWORD:?set PAPERLESS_DB_PASSWORD in .env}"
    volumes:
      - ${PAPERLESS_DB_DATA_LOCATION:-${DOCKER_SSD_CONFIG_DIR}/paperless-postgres}:/var/lib/postgresql/data
    networks:
      - media-stack
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PAPERLESS_DB_USER:-paperless} -d ${PAPERLESS_DB_NAME:-paperless}"]
      <<: *healthcheck-defaults
    profiles:
      - paperless

  paperless-gotenberg:
    <<: [*service-defaults, *resources-medium]
    image: gotenberg/gotenberg:8.25
    container_name: paperless-gotenberg
    command:
      - gotenberg
      - --chromium-disable-javascript=true
      - --chromium-allow-list=file:///tmp/.*
    networks:
      - media-stack
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      <<: *healthcheck-defaults
    profiles:
      - paperless

  paperless-tika:
    <<: [*service-defaults, *resources-small]
    image: apache/tika:latest
    container_name: paperless-tika
    networks:
      - media-stack
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9998/"]
      <<: *healthcheck-defaults
    profiles:
      - paperless

  paperless-ngx:
    <<: [*service-defaults, *resources-large]
    image: ghcr.io/paperless-ngx/paperless-ngx:latest
    container_name: paperless-ngx
    environment:
      USERMAP_UID: ${PUID}
      USERMAP_GID: ${PGID}
      PAPERLESS_TIME_ZONE: ${TZ}
      PAPERLESS_URL: ${PAPERLESS_URL:-https://${PAPERLESS_SUBDOMAIN:-paperless}.${DOMAIN_NAME:-localhost}}
      PAPERLESS_SECRET_KEY: "${PAPERLESS_SECRET_KEY:?set PAPERLESS_SECRET_KEY in .env}"
      PAPERLESS_REDIS: redis://paperless-broker:6379
      PAPERLESS_DBHOST: paperless-db
      PAPERLESS_DBNAME: ${PAPERLESS_DB_NAME:-paperless}
      PAPERLESS_DBUSER: ${PAPERLESS_DB_USER:-paperless}
      PAPERLESS_DBPASS: "${PAPERLESS_DB_PASSWORD:?set PAPERLESS_DB_PASSWORD in .env}"
      PAPERLESS_OCR_LANGUAGE: ${PAPERLESS_OCR_LANGUAGE:-eng}
      PAPERLESS_OCR_LANGUAGES: ${PAPERLESS_OCR_LANGUAGES:-}
      PAPERLESS_TIKA_ENABLED: "1"
      PAPERLESS_TIKA_GOTENBERG_ENDPOINT: http://paperless-gotenberg:3000
      PAPERLESS_TIKA_ENDPOINT: http://paperless-tika:9998
    volumes:
      - ${DOCKER_BASE_DIR}/paperless/data:/usr/src/paperless/data
      - ${DOCKER_BASE_DIR}/paperless/media:/usr/src/paperless/media
      - ${DOCKER_BASE_DIR}/paperless/export:/usr/src/paperless/export
      - ${PAPERLESS_CONSUME_DIR:-${DOCKER_MEDIA_DIR}/Documents/consume}:/usr/src/paperless/consume
    networks:
      - media-stack
    ports:
      - "8010:8000"
    healthcheck:
      test: ["CMD", "curl", "-fs", "-S", "-L", "--max-time", "2", "http://localhost:8000"]
      <<: *healthcheck-defaults
    depends_on:
      paperless-broker:
        condition: service_healthy
      paperless-db:
        condition: service_healthy
      paperless-gotenberg:
        condition: service_healthy
      paperless-tika:
        condition: service_healthy
    labels:
      - "com.centurylinklabs.watchtower.enable=false"
      - "homepage.group=Documents"
      - "homepage.name=Paperless-ngx"
      - "homepage.icon=paperless-ngx"
      - "homepage.href=${PAPERLESS_URL:-https://${PAPERLESS_SUBDOMAIN:-paperless}.${DOMAIN_NAME:-localhost}}"
      - "homepage.description=Document Archive & OCR"
      - "pangolin.public-resources.paperless.name=Paperless-ngx"
      - "pangolin.public-resources.paperless.protocol=http"
      - "pangolin.public-resources.paperless.full-domain=${PAPERLESS_SUBDOMAIN:-paperless}.${DOMAIN_NAME:-localhost}"
      - "pangolin.public-resources.paperless.auth.sso-enabled=true"
      - "pangolin.public-resources.paperless.targets[0].hostname=paperless-ngx"
      - "pangolin.public-resources.paperless.targets[0].method=http"
      - "pangolin.public-resources.paperless.targets[0].port=8000"
      - "pangolin.public-resources.paperless.targets[0].healthcheck.hostname=paperless-ngx"
      - "pangolin.public-resources.paperless.targets[0].healthcheck.port=8000"
      - "pangolin.public-resources.paperless.targets[0].healthcheck.path=/"
      - "pangolin.public-resources.paperless.targets[0].healthcheck.status=200"
    profiles:
      - paperless

  stirling-pdf:
    <<: [*service-defaults, *resources-medium]
    image: docker.stirlingpdf.com/stirlingtools/stirling-pdf:latest
    container_name: stirling-pdf
    environment:
      DOCKER_ENABLE_SECURITY: "false"
      SECURITY_ENABLELOGIN: "false"
      SYSTEM_DEFAULTLOCALE: en-US
      UI_APPNAME: Stirling PDF
      UI_HOMEDESCRIPTION: Self-hosted PDF toolbox
      UI_APPNAMENAVBAR: Stirling PDF
      SYSTEM_MAXFILESIZE: "100"
      METRICS_ENABLED: "true"
    volumes:
      - ${DOCKER_BASE_DIR}/stirling-pdf/tessdata:/usr/share/tessdata
      - ${DOCKER_BASE_DIR}/stirling-pdf/config:/configs
      - ${DOCKER_BASE_DIR}/stirling-pdf/logs:/logs
    networks:
      - media-stack
    ports:
      - "8085:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/api/v1/info/status | grep -q 'UP'"]
      <<: *healthcheck-defaults
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
      - "homepage.group=Documents"
      - "homepage.name=Stirling PDF"
      - "homepage.icon=stirling-pdf"
      - "homepage.href=https://${STIRLING_SUBDOMAIN:-pdf}.${DOMAIN_NAME:-localhost}"
      - "homepage.description=PDF Tools"
      - "pangolin.public-resources.stirling-pdf.name=Stirling PDF"
      - "pangolin.public-resources.stirling-pdf.protocol=http"
      - "pangolin.public-resources.stirling-pdf.full-domain=${STIRLING_SUBDOMAIN:-pdf}.${DOMAIN_NAME:-localhost}"
      - "pangolin.public-resources.stirling-pdf.auth.sso-enabled=true"
      - "pangolin.public-resources.stirling-pdf.targets[0].hostname=stirling-pdf"
      - "pangolin.public-resources.stirling-pdf.targets[0].method=http"
      - "pangolin.public-resources.stirling-pdf.targets[0].port=8080"
      - "pangolin.public-resources.stirling-pdf.targets[0].healthcheck.hostname=stirling-pdf"
      - "pangolin.public-resources.stirling-pdf.targets[0].healthcheck.port=8080"
      - "pangolin.public-resources.stirling-pdf.targets[0].healthcheck.path=/api/v1/info/status"
      - "pangolin.public-resources.stirling-pdf.targets[0].healthcheck.status=200"
    profiles:
      - stirling

  karakeep-meilisearch:
    <<: [*service-defaults, *resources-small]
    image: getmeili/meilisearch:v1.37.0
    container_name: karakeep-meilisearch
    environment:
      MEILI_NO_ANALYTICS: "true"
      MEILI_MASTER_KEY: "${KARAKEEP_MEILI_MASTER_KEY:?set KARAKEEP_MEILI_MASTER_KEY in .env}"
    volumes:
      - ${DOCKER_BASE_DIR}/karakeep/meilisearch:/meili_data
    networks:
      - media-stack
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7700/health"]
      <<: *healthcheck-defaults
    profiles:
      - karakeep

  karakeep-chrome:
    <<: [*service-defaults, *resources-medium]
    image: gcr.io/zenika-hub/alpine-chrome:124
    container_name: karakeep-chrome
    command:
      - --no-sandbox
      - --disable-gpu
      - --disable-dev-shm-usage
      - --remote-debugging-address=0.0.0.0
      - --remote-debugging-port=9222
      - --hide-scrollbars
    networks:
      - media-stack
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--output-document=/dev/null", "http://localhost:9222/json/version"]
      <<: *healthcheck-defaults
    profiles:
      - karakeep

  karakeep:
    <<: [*service-defaults, *resources-medium]
    image: ghcr.io/karakeep-app/karakeep:${KARAKEEP_VERSION:-release}
    container_name: karakeep
    environment:
      NEXTAUTH_URL: ${KARAKEEP_BASE_URL:-https://${KARAKEEP_SUBDOMAIN:-karakeep}.${DOMAIN_NAME:-localhost}}
      NEXTAUTH_SECRET: "${KARAKEEP_NEXTAUTH_SECRET:?set KARAKEEP_NEXTAUTH_SECRET in .env}"
      MEILI_ADDR: http://karakeep-meilisearch:7700
      MEILI_MASTER_KEY: "${KARAKEEP_MEILI_MASTER_KEY:?set KARAKEEP_MEILI_MASTER_KEY in .env}"
      BROWSER_WEB_URL: http://karakeep-chrome:9222
      DATA_DIR: /data
    volumes:
      - ${DOCKER_BASE_DIR}/karakeep/data:/data
    networks:
      - media-stack
    ports:
      - "3005:3000"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3000/api/health"]
      <<: *healthcheck-defaults
    depends_on:
      karakeep-meilisearch:
        condition: service_healthy
      karakeep-chrome:
        condition: service_healthy
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
      - "homepage.group=Knowledge"
      - "homepage.name=Karakeep"
      - "homepage.icon=karakeep"
      - "homepage.href=${KARAKEEP_BASE_URL:-https://${KARAKEEP_SUBDOMAIN:-karakeep}.${DOMAIN_NAME:-localhost}}"
      - "homepage.description=Bookmarks & Read Later"
      - "pangolin.public-resources.karakeep.name=Karakeep"
      - "pangolin.public-resources.karakeep.protocol=http"
      - "pangolin.public-resources.karakeep.full-domain=${KARAKEEP_SUBDOMAIN:-karakeep}.${DOMAIN_NAME:-localhost}"
      - "pangolin.public-resources.karakeep.auth.sso-enabled=true"
      - "pangolin.public-resources.karakeep.targets[0].hostname=karakeep"
      - "pangolin.public-resources.karakeep.targets[0].method=http"
      - "pangolin.public-resources.karakeep.targets[0].port=3000"
      - "pangolin.public-resources.karakeep.targets[0].healthcheck.hostname=karakeep"
      - "pangolin.public-resources.karakeep.targets[0].healthcheck.port=3000"
      - "pangolin.public-resources.karakeep.targets[0].healthcheck.path=/api/health"
      - "pangolin.public-resources.karakeep.targets[0].healthcheck.status=200"
    profiles:
      - karakeep

  docmost-db:
    <<: [*service-defaults, *resources-small]
    image: postgres:18-alpine
    container_name: docmost-db
    environment:
      POSTGRES_DB: ${DOCMOST_DB_NAME:-docmost}
      POSTGRES_USER: ${DOCMOST_DB_USER:-docmost}
      POSTGRES_PASSWORD: "${DOCMOST_DB_PASSWORD:?set DOCMOST_DB_PASSWORD in .env}"
    volumes:
      - ${DOCMOST_DB_DATA_LOCATION:-${DOCKER_SSD_CONFIG_DIR}/docmost-postgres}:/var/lib/postgresql/data
    networks:
      - media-stack
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DOCMOST_DB_USER:-docmost} -d ${DOCMOST_DB_NAME:-docmost}"]
      <<: *healthcheck-defaults
    profiles:
      - docmost

  docmost-redis:
    <<: [*service-defaults, *resources-small]
    image: redis:8-alpine
    container_name: docmost-redis
    command: ["redis-server", "--appendonly", "yes", "--maxmemory-policy", "noeviction"]
    volumes:
      - ${DOCKER_BASE_DIR}/docmost/redis:/data
    networks:
      - media-stack
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      <<: *healthcheck-defaults
    profiles:
      - docmost

  docmost:
    <<: [*service-defaults, *resources-medium]
    image: docmost/docmost:latest
    container_name: docmost
    environment:
      APP_URL: ${DOCMOST_BASE_URL:-https://${DOCMOST_SUBDOMAIN:-docs}.${DOMAIN_NAME:-localhost}}
      PORT: 3000
      APP_SECRET: "${DOCMOST_APP_SECRET:?set DOCMOST_APP_SECRET in .env}"
      DATABASE_URL: "postgresql://${DOCMOST_DB_USER:-docmost}:${DOCMOST_DB_PASSWORD:?set DOCMOST_DB_PASSWORD in .env}@docmost-db:5432/${DOCMOST_DB_NAME:-docmost}?schema=public"
      REDIS_URL: redis://docmost-redis:6379
      STORAGE_DRIVER: local
    volumes:
      - ${DOCKER_BASE_DIR}/docmost/storage:/app/data/storage
    networks:
      - media-stack
    ports:
      - "3004:3000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      <<: *healthcheck-defaults
    depends_on:
      docmost-db:
        condition: service_healthy
      docmost-redis:
        condition: service_healthy
    labels:
      - "com.centurylinklabs.watchtower.enable=false"
      - "homepage.group=Knowledge"
      - "homepage.name=Docmost"
      - "homepage.icon=docmost"
      - "homepage.href=${DOCMOST_BASE_URL:-https://${DOCMOST_SUBDOMAIN:-docs}.${DOMAIN_NAME:-localhost}}"
      - "homepage.description=Collaborative Wiki"
      - "pangolin.public-resources.docmost.name=Docmost"
      - "pangolin.public-resources.docmost.protocol=http"
      - "pangolin.public-resources.docmost.full-domain=${DOCMOST_SUBDOMAIN:-docs}.${DOMAIN_NAME:-localhost}"
      - "pangolin.public-resources.docmost.auth.sso-enabled=true"
      - "pangolin.public-resources.docmost.targets[0].hostname=docmost"
      - "pangolin.public-resources.docmost.targets[0].method=http"
      - "pangolin.public-resources.docmost.targets[0].port=3000"
      - "pangolin.public-resources.docmost.targets[0].healthcheck.hostname=docmost"
      - "pangolin.public-resources.docmost.targets[0].healthcheck.port=3000"
      - "pangolin.public-resources.docmost.targets[0].healthcheck.path=/api/health"
      - "pangolin.public-resources.docmost.targets[0].healthcheck.status=200"
    profiles:
      - docmost
