    container_name: lidarr
    restart: unless-stopped
    network_mode: "service:gluetun"
    security_opt:
      - no-new-privileges:true
    environment:
      PUID: ${PUID}
      PGID: ${PGID}
      TZ: ${TZ}
    user: "${PUID}:${PGID}"
    volumes:
      - ${DOCKER_BASE_DIR}/lidarr:/config
      - ${DOCKER_MEDIA_DIR}/Songs:/music_library
      - ${DOCKER_BASE_DIR}/downloads:/downloads
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8686/ping"]
      interval: 1m
      timeout: 10s
      retries: 3
      start_period: 30s
    depends_on:
      gluetun:
        condition: service_healthy
      qbittorrent:
        condition: service_healthy
      prowlarr:
