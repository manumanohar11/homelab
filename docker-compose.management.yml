# ~/media-stack/docker-compose.management.yml
# Contains utility and management tools.

x-service-defaults: &service-defaults
  restart: unless-stopped
  init: true
  security_opt:
    - no-new-privileges:true
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "3"

x-healthcheck-defaults: &healthcheck-defaults
  interval: 30s
  timeout: 10s
  retries: 3
  start_period: 30s

x-resources-small: &resources-small
  deploy:
    resources:
      limits:
        cpus: '0.5'
        memory: 256M
      reservations:
        memory: 64M

x-resources-medium: &resources-medium
  deploy:
    resources:
      limits:
        cpus: '1'
        memory: 512M
      reservations:
        memory: 128M

services:
  portainer:
    <<: [*service-defaults, *resources-medium]
    image: portainer/portainer-ce:latest
    container_name: portainer
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ${DOCKER_BASE_DIR}/portainer:/data
    networks:
      - media-stack
    ports:
      - "9443:9443"
    # Note: Portainer CE uses a minimal image without wget/curl
    # Using /docker CLI to verify container is responsive
    healthcheck:
      test: ["CMD", "/docker", "container", "top", "portainer"]
      <<: *healthcheck-defaults
      start_period: 30s
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
      - "pangolin.public-resources.portainer.name=Portainer"
      - "pangolin.public-resources.portainer.protocol=http"
      - "pangolin.public-resources.portainer.full-domain=${PORTAINER_SUBDOMAIN:-portainer}.${DOMAIN_NAME:-localhost}"
      - "pangolin.public-resources.portainer.auth.sso-enabled=true"
      - "pangolin.public-resources.portainer.targets[0].hostname=portainer"
      - "pangolin.public-resources.portainer.targets[0].method=https"
      - "pangolin.public-resources.portainer.targets[0].port=9443"

  watchtower:
    <<: [*service-defaults, *resources-small]
    image: containrrr/watchtower:latest
    container_name: watchtower
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      TZ: ${TZ}
      DOCKER_API_VERSION: "1.44"
      WATCHTOWER_CLEANUP: "true"
      WATCHTOWER_SCHEDULE: "0 0 4 * * *"
      WATCHTOWER_ROLLING_RESTART: "true"
      WATCHTOWER_TIMEOUT: "30s"
      WATCHTOWER_INCLUDE_RESTARTING: "true"
      WATCHTOWER_NOTIFICATIONS: ${WATCHTOWER_NOTIFICATIONS:-}
      WATCHTOWER_NOTIFICATION_URL: ${WATCHTOWER_NOTIFICATION_URL:-}
    networks:
      - media-stack
    healthcheck:
      test: ["CMD", "/watchtower", "--health-check"]
      <<: *healthcheck-defaults
      start_period: 10s

  glances:
    <<: [*service-defaults, *resources-medium]
    image: nicolargo/glances:latest-full
    container_name: glances
    pid: "host"
    volumes:
      - ${DOCKER_BASE_DIR}/glances:/glances/conf
    environment:
      GLANCES_OPT: -w
      TZ: ${TZ}
      # Use Docker socket proxy instead of direct socket access
      DOCKER_HOST: tcp://docker-socket-proxy:2375
    networks:
      - media-stack
    ports:
      - "61208:61208"
    depends_on:
      docker-socket-proxy:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:61208/api/4/cpu"]
      <<: *healthcheck-defaults
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
      - "pangolin.public-resources.glances.name=Glances"
      - "pangolin.public-resources.glances.protocol=http"
      - "pangolin.public-resources.glances.full-domain=${GLANCES_SUBDOMAIN:-glances}.${DOMAIN_NAME:-localhost}"
      - "pangolin.public-resources.glances.auth.sso-enabled=true"
      - "pangolin.public-resources.glances.targets[0].hostname=glances"
      - "pangolin.public-resources.glances.targets[0].method=http"
      - "pangolin.public-resources.glances.targets[0].port=61208"
      - "pangolin.public-resources.glances.targets[0].healthcheck.hostname=glances"
      - "pangolin.public-resources.glances.targets[0].healthcheck.port=61208"
      - "pangolin.public-resources.glances.targets[0].healthcheck.path=/api/4/cpu"
      - "pangolin.public-resources.glances.targets[0].healthcheck.status=200"
    profiles:
      - monitoring

  glance-homepage:
    <<: [*service-defaults, *resources-small]
    image: glanceapp/glance:latest
    container_name: glance-homepage
    volumes:
      - ${DOCKER_GIT_CONFIG_DIR}/glance-homepage/config:/app/config
      - ${DOCKER_GIT_CONFIG_DIR}/glance-homepage/assets:/app/assets
    environment:
      GLANCE_UID: ${PUID}
      GLANCE_GID: ${PGID}
      TZ: ${TZ}
      # Use Docker socket proxy instead of direct socket access
      DOCKER_HOST: tcp://docker-socket-proxy:2375
    networks:
      - media-stack
    ports:
      - "8088:8080"
    depends_on:
      docker-socket-proxy:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080"]
      <<: *healthcheck-defaults
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
      - "pangolin.public-resources.glance.name=Glance"
      - "pangolin.public-resources.glance.protocol=http"
      - "pangolin.public-resources.glance.full-domain=${GLANCE_SUBDOMAIN:-glance}.${DOMAIN_NAME:-localhost}"
      - "pangolin.public-resources.glance.auth.sso-enabled=true"
      - "pangolin.public-resources.glance.targets[0].hostname=glance-homepage"
      - "pangolin.public-resources.glance.targets[0].method=http"
      - "pangolin.public-resources.glance.targets[0].port=8080"
      - "pangolin.public-resources.glance.targets[0].healthcheck.hostname=glance-homepage"
      - "pangolin.public-resources.glance.targets[0].healthcheck.port=8080"
      - "pangolin.public-resources.glance.targets[0].healthcheck.path=/"
      - "pangolin.public-resources.glance.targets[0].healthcheck.status=200"
    profiles:
      - dashboard
