# ~/media-stack/docker-compose.logging.yml
# Contains centralized logging with Loki and Promtail.

services:
  loki:
    image: grafana/loki:latest
    container_name: loki
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - media-stack
    ports:
      - "3100:3100"
    volumes:
      - ${DOCKER_BASE_DIR}/loki/config:/etc/loki
      - ${DOCKER_BASE_DIR}/loki/data:/loki
    # Note: Loki's minimal image lacks wget/curl for healthchecks
    # Promtail uses service_started dependency instead
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          memory: 512M
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
      - "homepage.group=Monitoring"
      - "homepage.name=Loki"
      - "homepage.icon=loki"
      - "homepage.description=Log Aggregation"

  promtail:
    image: grafana/promtail:latest
    container_name: promtail
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    command: -config.file=/etc/promtail/config.yml
    networks:
      - media-stack
    volumes:
      - ${DOCKER_BASE_DIR}/promtail/config:/etc/promtail
      - /var/log:/var/log:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      loki:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:9080/ready || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          memory: 128M
    labels:
      - "homepage.group=Monitoring"
      - "homepage.name=Promtail"
      - "homepage.description=Log Collector"

  # Vector as alternative log shipper (more powerful than Promtail)
  vector:
    image: timberio/vector:latest-alpine
    container_name: vector
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    networks:
      - media-stack
    volumes:
      - ${DOCKER_BASE_DIR}/vector/config:/etc/vector:ro
      - /var/log:/var/log:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      VECTOR_CONFIG: /etc/vector/vector.yaml
    depends_on:
      loki:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8686/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          memory: 128M
    labels:
      - "homepage.group=Monitoring"
      - "homepage.name=Vector"
      - "homepage.description=Log Pipeline"
    profiles:
      - vector
