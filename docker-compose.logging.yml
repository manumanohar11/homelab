# ~/media-stack/docker-compose.logging.yml
# Contains beginner-friendly centralized container logging with Loki and Promtail.

x-service-defaults: &service-defaults
  restart: unless-stopped
  security_opt:
    - no-new-privileges:true
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "3"

x-healthcheck-defaults: &healthcheck-defaults
  interval: 30s
  timeout: 10s
  retries: 3
  start_period: 30s

x-resources-medium: &resources-medium
  deploy:
    resources:
      limits:
        cpus: '1'
        memory: 512M
      reservations:
        memory: 128M

x-resources-large: &resources-large
  deploy:
    resources:
      limits:
        cpus: '2'
        memory: 2G
      reservations:
        memory: 512M

services:
  loki:
    <<: [*service-defaults, *resources-large]
    image: grafana/loki:latest
    container_name: loki
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - media-stack
    ports:
      - "3100:3100"
    volumes:
      - ${DOCKER_BASE_DIR}/loki/config:/etc/loki
      - ${DOCKER_BASE_DIR}/loki/data:/loki
    # Note: Loki's minimal image lacks wget/curl for healthchecks
    # Promtail uses service_started dependency instead
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
      - "homepage.group=Monitoring"
      - "homepage.name=Loki"
      - "homepage.icon=loki"
      - "homepage.description=Log Aggregation"

  promtail:
    <<: [*service-defaults, *resources-medium]
    image: grafana/promtail:latest
    container_name: promtail
    command: -config.file=/etc/promtail/config.yml
    networks:
      - media-stack
    volumes:
      - ${DOCKER_BASE_DIR}/promtail/config:/etc/promtail
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      loki:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "cat /proc/1/status || exit 1"]
      <<: *healthcheck-defaults
      start_period: 10s
    labels:
      - "homepage.group=Monitoring"
      - "homepage.name=Promtail"
      - "homepage.description=Log Collector"
