# ~/media-stack/docker-compose.backup.yml
# Contains backup services for automated data protection.

x-common-env: &common-env
  PUID: ${PUID}
  PGID: ${PGID}
  TZ: ${TZ}

x-service-defaults: &service-defaults
  restart: unless-stopped
  security_opt:
    - no-new-privileges:true
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "3"

x-healthcheck-defaults: &healthcheck-defaults
  interval: 30s
  timeout: 10s
  retries: 3
  start_period: 30s

x-resources-medium: &resources-medium
  deploy:
    resources:
      limits:
        cpus: '1'
        memory: 512M
      reservations:
        memory: 128M

x-resources-large: &resources-large
  deploy:
    resources:
      limits:
        cpus: '2'
        memory: 2G
      reservations:
        memory: 256M

services:
  duplicati:
    <<: [*service-defaults, *resources-large]
    image: lscr.io/linuxserver/duplicati:latest
    container_name: duplicati
    environment:
      <<: *common-env
      SETTINGS_ENCRYPTION_KEY: ${DUPLICATI_ENCRYPTION_KEY}
    volumes:
      - ${DOCKER_BASE_DIR}/duplicati:/config
      # Primary backup source: all service data, including db-backup output when enabled
      - ${DOCKER_BASE_DIR}:/source/docker-configs:ro
      # Critical project secrets live in .env, which is outside DOCKER_BASE_DIR
      - ${DOCKER_PROJECT_DIR:-/opt/media-stack}/.env:/source/project/.env:ro
      # Backup destination
      - ${BACKUP_DESTINATION:-/mnt/backup}:/backups
    networks:
      - media-stack
    ports:
      - "8200:8200"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8200"]
      interval: 1m
      timeout: 10s
      retries: 3
      start_period: 30s
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  # Optional advanced repository endpoint for operators already using Restic clients
  restic-rest-server:
    <<: [*service-defaults, *resources-medium]
    image: restic/rest-server:latest
    container_name: restic-rest-server
    environment:
      OPTIONS: "--prometheus --prometheus-no-auth"
      DISABLE_AUTHENTICATION: "false"
    volumes:
      - ${DOCKER_BASE_DIR}/restic-server/data:/data
      - ${DOCKER_BASE_DIR}/restic-server/.htpasswd:/data/.htpasswd:ro
    networks:
      - media-stack
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8000"]
      <<: *healthcheck-defaults
    profiles:
      - restic

  # Optional PostgreSQL dump worker. Output lands inside ${DOCKER_BASE_DIR}/db-backup.
  db-backup:
    <<: [*service-defaults, *resources-medium]
    image: tiredofit/db-backup:latest
    container_name: db-backup
    environment:
      TIMEZONE: ${TZ}
      CONTAINER_ENABLE_MONITORING: "false"
      DEFAULT_CHECKSUM: SHA1
      DEFAULT_COMPRESSION: ZSTD
      DEFAULT_BACKUP_INTERVAL: 1440  # 24 hours in minutes
      DEFAULT_BACKUP_BEGIN: "0300"   # 3:00 AM
      DEFAULT_CLEANUP_TIME: 8640     # 6 days in minutes
      # Immich PostgreSQL
      DB01_TYPE: pgsql
      DB01_HOST: immich_postgres
      DB01_NAME: ${DB_DATABASE_NAME:-immich}
      DB01_USER: ${DB_USERNAME:-postgres}
      DB01_PASS: ${DB_PASSWORD}
      DB01_BACKUP_INTERVAL: 1440
      DB01_BACKUP_BEGIN: "0300"
      # Bitmagnet PostgreSQL (when downloaders enabled)
      # DB02_TYPE: pgsql
      # DB02_HOST: bitmagnet-postgres
      # DB02_NAME: bitmagnet
      # DB02_USER: postgres
      # DB02_PASS: ${BITMAGNET_POSTGRES_PASSWORD:-bitmagnet_secret}
      # DB02_BACKUP_INTERVAL: 1440
      # DB02_BACKUP_BEGIN: "0315"
    volumes:
      - ${DOCKER_BASE_DIR}/db-backup:/backup
    networks:
      - media-stack
    depends_on:
      database:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f db-backup || exit 1"]
      interval: 1m
      timeout: 10s
      retries: 3
    profiles:
      - db-backup
