# ~/media-stack/docker-compose.automation.yml
# Contains n8n workflow automation tool

services:
  n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    container_name: n8n
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    networks:
      - media-stack
    ports:
      - "5678:5678"
    environment:
      GENERIC_TIMEZONE: ${TZ}
      TZ: ${TZ}
      N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS: "true"
      N8N_RUNNERS_ENABLED: "true"
      N8N_HOST: ${N8N_SUBDOMAIN:-n8n}.${DOMAIN_NAME:-localhost}
      N8N_PORT: 5678
      N8N_PROTOCOL: https
      NODE_ENV: production
      WEBHOOK_URL: https://${N8N_SUBDOMAIN:-n8n}.${DOMAIN_NAME:-localhost}/
      N8N_METRICS: "true"
      N8N_DIAGNOSTICS_ENABLED: "false"
    volumes:
      - ${DOCKER_BASE_DIR}/n8n:/home/node/.n8n
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5678/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          memory: 512M
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
      - "homepage.group=Automation"
      - "homepage.name=n8n"
      - "homepage.icon=n8n"
      - "homepage.href=https://${N8N_SUBDOMAIN:-n8n}.${DOMAIN_NAME:-localhost}"
      - "homepage.description=Workflow Automation"
