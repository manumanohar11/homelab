# ~/media-stack/docker-compose.automation.yml
# Contains workflow automation services. Enable with the `automation` profile.

x-service-defaults: &service-defaults
  restart: unless-stopped
  init: true
  security_opt:
    - no-new-privileges:true
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "3"

x-resources-large: &resources-large
  deploy:
    resources:
      limits:
        cpus: '2'
        memory: 2G
      reservations:
        memory: 512M

services:
  n8n:
    <<: [*service-defaults, *resources-large]
    image: docker.n8n.io/n8nio/n8n:latest
    container_name: n8n
    environment:
      GENERIC_TIMEZONE: ${TZ}
      TZ: ${TZ}
      N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS: "true"
      N8N_RUNNERS_ENABLED: "true"
      N8N_HOST: ${N8N_SUBDOMAIN:-n8n}.${DOMAIN_NAME:-localhost}
      N8N_PORT: 5678
      N8N_PROTOCOL: https
      NODE_ENV: production
      WEBHOOK_URL: https://${N8N_SUBDOMAIN:-n8n}.${DOMAIN_NAME:-localhost}/
      N8N_METRICS: "true"
      N8N_DIAGNOSTICS_ENABLED: "false"
    volumes:
      - ${DOCKER_BASE_DIR}/n8n:/home/node/.n8n
    networks:
      - media-stack
    ports:
      - "5678:5678"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5678/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
      - "homepage.group=Automation"
      - "homepage.name=n8n"
      - "homepage.icon=n8n"
      - "homepage.href=https://${N8N_SUBDOMAIN:-n8n}.${DOMAIN_NAME:-localhost}"
      - "homepage.description=Workflow Automation"
      - "pangolin.public-resources.n8n.name=n8n"
      - "pangolin.public-resources.n8n.protocol=http"
      - "pangolin.public-resources.n8n.full-domain=${N8N_SUBDOMAIN:-n8n}.${DOMAIN_NAME:-localhost}"
      - "pangolin.public-resources.n8n.auth.sso-enabled=true"
      - "pangolin.public-resources.n8n.targets[0].hostname=n8n"
      - "pangolin.public-resources.n8n.targets[0].method=http"
      - "pangolin.public-resources.n8n.targets[0].port=5678"
      - "pangolin.public-resources.n8n.targets[0].healthcheck.hostname=n8n"
      - "pangolin.public-resources.n8n.targets[0].healthcheck.port=5678"
      - "pangolin.public-resources.n8n.targets[0].healthcheck.path=/healthz"
      - "pangolin.public-resources.n8n.targets[0].healthcheck.status=200"
    profiles:
      - automation
