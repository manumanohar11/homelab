# /mnt/g/docker/docker-compose.access.yml
# Optional access bundle: Pangolin/Newt remote access.
services:
  newt:
    extends:
      file: docker-compose.common.yml
      service: _service-small
    image: fosrl/newt
    container_name: newt
    environment:
      PANGOLIN_ENDPOINT: ${PANGOLIN_ENDPOINT:-}
      NEWT_ID: ${NEWT_ID}
      NEWT_SECRET: ${NEWT_SECRET}
      DOCKER_SOCKET: /var/run/docker.sock
      TZ: ${TZ}
    volumes:
    - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
    - media-stack
    healthcheck:
      start_period: 10s
      test:
      - CMD-SHELL
      - pgrep -x newt || exit 1
    labels:
    - com.centurylinklabs.watchtower.enable=false
