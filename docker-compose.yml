# ~/media-stack/docker-compose.yml
# This is the main file to run the entire stack.
# Command: docker compose up -d
#
# Most optional services are controlled with profiles.
# Comment include lines only if you want to remove a whole module locally.
# Use profiles to enable optional services within modules:
#   docker compose --profile vpn --profile monitoring up -d

name: media-stack

# --- Global Network Definition ---
networks:
  media-stack:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

# --- Include all the component files ---
# The common file with anchors is included first.
include:
  # Core infrastructure
  - docker-compose.common.yml
  - docker-compose.core.yml

  # Optional host-specific overrides
  # - docker-compose.local.yml

  # Communication
  - docker-compose.communication.yml

  # Media management
  - docker-compose.photos.yml
  - docker-compose.media-servers.yml
  # - docker-compose.arr.yml
  # - docker-compose.downloaders.yml
  # - docker-compose.requests.yml

  # Management & monitoring
  - docker-compose.management.yml
  # - docker-compose.monitoring.yml
  # - docker-compose.logging.yml # Loki/Promtail stack

  # Productivity
  # - docker-compose.productivity.yml
  # - docker-compose.documents.yml
  # - docker-compose.files.yml
  # - docker-compose.automation.yml

  # Backup
  - docker-compose.backup.yml

  # Utilities (Homarr, Speedtest, Scrutiny, Dozzle)
  - docker-compose.utilities.yml

  # Media utilities (Tautulli, Maintainerr, Tdarr)
  - docker-compose.media-extras.yml

# --- Available Profiles ---
# monitoring    - Glances system monitor
# dashboard     - Glance alternative dashboard
# jellyfin      - Jellyfin and Jellyseerr
# kavita        - Kavita ebook/comic reader
# stash         - Stash media organizer
# tdarr         - Tdarr media transcoding
# jitsi         - Jitsi Meet private video calling
# restic        - Restic backup server
# db-backup     - Database backup worker
# scrutiny      - Scrutiny disk S.M.A.R.T monitoring
# speedtest     - Speedtest Tracker internet speed history
# maintainerr   - Maintainerr media cleanup (requires *arr stack)
# navidrome     - Navidrome music streaming
