x-common-env: &common-env
  PUID: ${PUID}
  PGID: ${PGID}
  TZ: ${TZ}

x-arr-depends-on: &arr-depends-on
  gluetun:
    condition: service_healthy
  prowlarr:
    condition: service_healthy
  qbittorrent:
    condition: service_healthy

networks:
  media-stack:
    driver: bridge

services:
  # --- Section 1: Core Networking and Security ---

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared
    restart: unless-stopped
    command: tunnel --no-autoupdate run --token ${TUNNEL_TOKEN}
    networks:
      - media-stack
    depends_on:
      - caddy

  caddy:
    image: caddy:latest
    container_name: caddy
    restart: unless-stopped
    networks:
      - media-stack
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./media-stack/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./media-stack/caddy/data:/data
      - ./media-stack/caddy/config:/config
    environment:
      - DOMAIN_NAME=${DOMAIN_NAME}

  authelia:
    image: authelia/authelia:latest
    container_name: authelia
    restart: unless-stopped
    networks:
      - media-stack
    volumes:
      - ./media-stack/authelia:/config
    environment:
      - TZ=${TZ}

  gluetun:
    image: qmcgaw/gluetun:latest
    container_name: gluetun
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    volumes:
      - ${DOCKER_BASE_DIR}/gluetun:/gluetun
    environment:
      - VPN_SERVICE_PROVIDER=${VPN_SERVICE_PROVIDER}
      - OPENVPN_USER=${OPENVPN_USER}
      - OPENVPN_PASSWORD=${OPENVPN_PASSWORD}
      - SERVER_REGIONS=${SERVER_REGIONS}
      - FIREWALL_OUTBOUND_SUBNETS=192.168.0.0/24,172.16.0.0/12
    ports:
      - "6881:6881"
      - "6881:6881/udp"
    networks:
      - media-stack

  # --- Section 2: Downloaders and Indexers (behind VPN) ---

  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    restart: unless-stopped
    network_mode: "service:gluetun"
    environment:
      <<: *common-env
      WEBUI_PORT: 8080
    volumes:
      - ${DOCKER_BASE_DIR}/qbittorrent:/config
      - ${DOCKER_MEDIA_DIR}:/data
    depends_on:
      gluetun: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080"]
      interval: 1m
      timeout: 10s
      retries: 3

  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    restart: unless-stopped
    network_mode: "service:gluetun"
    environment:
      <<: *common-env
    volumes:
      - ${DOCKER_BASE_DIR}/prowlarr:/config
    depends_on:
      gluetun: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9696/ping"]
      interval: 1m
      timeout: 10s
      retries: 3

  # --- Section 3: Media Management - The *Arr Suite (behind VPN) ---

  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    restart: unless-stopped
    network_mode: "service:gluetun"
    environment:
      <<: *common-env
    volumes:
      - ${DOCKER_BASE_DIR}/radarr:/config
      - ${DOCKER_MEDIA_DIR}:/data
    depends_on: *arr-depends-on
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7878/ping"]
      interval: 1m
      timeout: 10s
      retries: 3

  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    restart: unless-stopped
    network_mode: "service:gluetun"
    environment:
      <<: *common-env
    volumes:
      - ${DOCKER_BASE_DIR}/sonarr:/config
      - ${DOCKER_MEDIA_DIR}:/data
    depends_on: *arr-depends-on
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8989/ping"]
      interval: 1m
      timeout: 10s
      retries: 3

  lidarr:
    image: lscr.io/linuxserver/lidarr:latest
    container_name: lidarr
    restart: unless-stopped
    network_mode: "service:gluetun"
    environment:
      <<: *common-env
    volumes:
      - ${DOCKER_BASE_DIR}/lidarr:/config
      - ${DOCKER_MEDIA_DIR}:/data
    depends_on: *arr-depends-on
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8686/ping"]
      interval: 1m
      timeout: 10s
      retries: 3

  bazarr:
    image: lscr.io/linuxserver/bazarr:latest
    container_name: bazarr
    restart: unless-stopped
    network_mode: "service:gluetun"
    environment:
      <<: *common-env
    volumes:
      - ${DOCKER_BASE_DIR}/bazarr:/config
      - ${DOCKER_MEDIA_DIR}:/data
    depends_on:
      gluetun: { condition: service_healthy }
      radarr: { condition: service_healthy }
      sonarr: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6767"]
      interval: 1m
      timeout: 10s
      retries: 3

  # --- Section 4: Media Servers (Direct Network Access) ---

  jellyfin:
    image: lscr.io/linuxserver/jellyfin:latest
    container_name: jellyfin
    restart: unless-stopped
    environment:
      <<: *common-env
    volumes:
      - ${DOCKER_BASE_DIR}/jellyfin:/config
      - ${DOCKER_MEDIA_DIR}/media:/data/media
    ports:
      - "8096:8096"
      - "8920:8920"
      - "7359:7359/udp"
      - "1900:1900/udp"
    networks:
      - media-stack

  plex:
    image: lscr.io/linuxserver/plex:latest
    container_name: plex
    restart: unless-stopped
    networks:
      - media-stack
    ports:
      - "32400:32400/tcp"
      - "3005:3005/tcp"
      - "8324:8324/tcp"
      - "32469:32469/tcp"
      - "32410:32410/udp"
      - "32412:32412/udp"
      - "32413:32413/udp"
      - "32414:32414/udp"
    environment:
      <<: *common-env
      VERSION: docker
    volumes:
      - /home/manohar/docker-config-files/plex:/config
      - ${DOCKER_MEDIA_DIR}/media:/data/media

  # --- Section 5: Utility and Management ---

  homepage:
    image: ghcr.io/gethomepage/homepage:latest
    container_name: homepage
    restart: unless-stopped
    environment:
      <<: *common-env
    volumes:
      - ${DOCKER_BASE_DIR}/homepage:/app/config
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - media-stack

  portainer:
    image: portainer/portainer-ce:latest
    container_name: portainer
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ${DOCKER_BASE_DIR}/portainer:/data
    ports:
      - "9443:9443"
      - "9000:9000"
    networks:
      - media-stack

  watchtower:
    image: containrrr/watchtower:latest
    container_name: watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: --schedule "0 0 4 * * *" --cleanup