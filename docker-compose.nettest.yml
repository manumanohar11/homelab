# Network Testing Tool Docker Compose Configuration
#
# Start monitoring mode:
#   docker compose -f docker-compose.nettest.yml up -d
#
# Run one-shot test:
#   docker compose -f docker-compose.nettest.yml run --rm nettest --profile full
#
# View logs:
#   docker compose -f docker-compose.nettest.yml logs -f

services:
  nettest:
    build:
      context: ./scripts/nettest
      dockerfile: Dockerfile
    container_name: nettest
    restart: unless-stopped

    # Default: continuous monitoring with Prometheus metrics
    command: >
      --monitor
      --interval 60
      --prometheus-port 9101
      --log-file /data/nettest.log
      --history /data/history.json
      --config /config/nettest.yml

    # Required for ping and mtr
    cap_add:
      - NET_RAW

    ports:
      # Prometheus metrics endpoint
      - "9101:9101"

    volumes:
      # Configuration
      - ./nettest/config:/config:ro
      # Output reports
      - ./nettest/output:/output
      # Persistent data (logs, history)
      - ./nettest/data:/data

    environment:
      # Timezone for accurate timestamps
      - TZ=UTC
      # Python settings
      - PYTHONUNBUFFERED=1

    # Health check
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:9101/metrics"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

    # Logging configuration
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

    networks:
      - monitoring

  # Optional: One-shot test runner
  nettest-oneshot:
    profiles:
      - oneshot
    build:
      context: ./scripts/nettest
      dockerfile: Dockerfile
    container_name: nettest-oneshot
    cap_add:
      - NET_RAW
    command: >
      --profile full
      --output /output
      --history /data/history.json
      --config /config/nettest.yml
    volumes:
      - ./nettest/config:/config:ro
      - ./nettest/output:/output
      - ./nettest/data:/data

networks:
  monitoring:
    name: nettest-monitoring
    driver: bridge
