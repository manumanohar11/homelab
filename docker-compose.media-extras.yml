# ~/media-stack/docker-compose.media-extras.yml
# Contains media utilities: Tautulli (Plex stats), Maintainerr (cleanup), Tdarr (transcoding)

x-common-env: &common-env
  PUID: ${PUID}
  PGID: ${PGID}
  TZ: ${TZ}

x-service-defaults: &service-defaults
  restart: unless-stopped
  init: true
  security_opt:
    - no-new-privileges:true
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "3"

x-healthcheck-defaults: &healthcheck-defaults
  interval: 30s
  timeout: 10s
  retries: 3
  start_period: 30s

x-resources-medium: &resources-medium
  deploy:
    resources:
      limits:
        cpus: '1'
        memory: 512M
      reservations:
        memory: 128M

services:
  # Tautulli - Plex media server monitoring and statistics
  tautulli:
    <<: [*service-defaults, *resources-medium]
    image: lscr.io/linuxserver/tautulli:latest
    container_name: tautulli
    init: false
    environment:
      <<: *common-env
    volumes:
      - ${DOCKER_BASE_DIR}/tautulli:/config
    networks:
      - media-stack
    ports:
      - "8181:8181"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8181/status"]
      <<: *healthcheck-defaults
      start_period: 30s
    labels:
      - "com.centurylinklabs.watchtower.enable=false"
      - "pangolin.public-resources.tautulli.name=Tautulli"
      - "pangolin.public-resources.tautulli.protocol=http"
      - "pangolin.public-resources.tautulli.full-domain=${TAUTULLI_SUBDOMAIN:-tautulli}.${DOMAIN_NAME:-localhost}"
      - "pangolin.public-resources.tautulli.auth.sso-enabled=true"
      - "pangolin.public-resources.tautulli.targets[0].hostname=tautulli"
      - "pangolin.public-resources.tautulli.targets[0].method=http"
      - "pangolin.public-resources.tautulli.targets[0].port=8181"
      - "pangolin.public-resources.tautulli.targets[0].healthcheck.hostname=tautulli"
      - "pangolin.public-resources.tautulli.targets[0].healthcheck.port=8181"
      - "pangolin.public-resources.tautulli.targets[0].healthcheck.path=/status"
      - "pangolin.public-resources.tautulli.targets[0].healthcheck.status=200"

  # Maintainerr - Automated media cleanup based on rules (requires *arr stack)
  maintainerr:
    <<: [*service-defaults, *resources-medium]
    image: ghcr.io/jorenn92/maintainerr:latest
    container_name: maintainerr
    environment:
      TZ: ${TZ}
    volumes:
      - ${DOCKER_BASE_DIR}/maintainerr:/opt/data
    networks:
      - media-stack
    ports:
      - "6246:6246"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6246"]
      <<: *healthcheck-defaults
      start_period: 30s
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
      - "pangolin.public-resources.maintainerr.name=Maintainerr"
      - "pangolin.public-resources.maintainerr.protocol=http"
      - "pangolin.public-resources.maintainerr.full-domain=${MAINTAINERR_SUBDOMAIN:-maintainerr}.${DOMAIN_NAME:-localhost}"
      - "pangolin.public-resources.maintainerr.auth.sso-enabled=true"
      - "pangolin.public-resources.maintainerr.targets[0].hostname=maintainerr"
      - "pangolin.public-resources.maintainerr.targets[0].method=http"
      - "pangolin.public-resources.maintainerr.targets[0].port=6246"
      - "pangolin.public-resources.maintainerr.targets[0].healthcheck.hostname=maintainerr"
      - "pangolin.public-resources.maintainerr.targets[0].healthcheck.port=6246"
      - "pangolin.public-resources.maintainerr.targets[0].healthcheck.path=/"
      - "pangolin.public-resources.maintainerr.targets[0].healthcheck.status=200"
    profiles:
      - maintainerr

  # Tdarr - Media transcoding and optimization
  tdarr:
    image: ghcr.io/haveagitgat/tdarr:latest
    container_name: tdarr
    restart: unless-stopped
    init: true
    security_opt:
      - no-new-privileges:true
    environment:
      PUID: ${PUID}
      PGID: ${PGID}
      TZ: ${TZ}
      UMASK_SET: 002
      serverIP: 0.0.0.0
      serverPort: 8266
      webUIPort: 8265
      internalNode: "true"
      inContainer: "true"
      ffmpegVersion: 6
      nodeName: MainNode
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: all
    volumes:
      - ${DOCKER_BASE_DIR}/tdarr/server:/app/server
      - ${DOCKER_BASE_DIR}/tdarr/configs:/app/configs
      - ${DOCKER_BASE_DIR}/tdarr/logs:/app/logs
      - ${DOCKER_MEDIA_DIR}:/media
      - ${DOCKER_BASE_DIR}/tdarr/transcode_cache:/temp
    networks:
      - media-stack
    ports:
      - "8265:8265"  # WebUI
      - "8266:8266"  # Server
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8265"]
      interval: 1m
      timeout: 10s
      retries: 3
      start_period: 60s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 8G
        reservations:
          memory: 1G
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
      - "pangolin.public-resources.tdarr.name=Tdarr"
      - "pangolin.public-resources.tdarr.protocol=http"
      - "pangolin.public-resources.tdarr.full-domain=${TDARR_SUBDOMAIN:-tdarr}.${DOMAIN_NAME:-localhost}"
      - "pangolin.public-resources.tdarr.auth.sso-enabled=true"
      - "pangolin.public-resources.tdarr.targets[0].hostname=tdarr"
      - "pangolin.public-resources.tdarr.targets[0].method=http"
      - "pangolin.public-resources.tdarr.targets[0].port=8265"
      - "pangolin.public-resources.tdarr.targets[0].healthcheck.hostname=tdarr"
      - "pangolin.public-resources.tdarr.targets[0].healthcheck.port=8265"
      - "pangolin.public-resources.tdarr.targets[0].healthcheck.path=/"
      - "pangolin.public-resources.tdarr.targets[0].healthcheck.status=200"
    profiles:
      - tdarr
