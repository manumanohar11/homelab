# ~/media-stack/docker-compose.media-extras.yml
# Contains media utilities: Tautulli (Plex stats), Maintainerr (cleanup), Tdarr (transcoding)

services:
  # Tautulli - Plex media server monitoring and statistics
  tautulli:
    image: lscr.io/linuxserver/tautulli:latest
    container_name: tautulli
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    environment:
      PUID: ${PUID}
      PGID: ${PGID}
      TZ: ${TZ}
    volumes:
      - ${DOCKER_BASE_DIR}/tautulli:/config
    networks:
      - media-stack
    ports:
      - "8181:8181"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8181/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          memory: 128M
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  # Maintainerr - Automated media cleanup based on rules (requires *arr stack)
  maintainerr:
    image: ghcr.io/jorenn92/maintainerr:latest
    container_name: maintainerr
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    environment:
      TZ: ${TZ}
    volumes:
      - ${DOCKER_BASE_DIR}/maintainerr:/opt/data
    networks:
      - media-stack
    ports:
      - "6246:6246"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6246"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          memory: 128M
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    profiles:
      - maintainerr

  # Tdarr - Media transcoding and optimization
  tdarr:
    image: ghcr.io/haveagitgat/tdarr:latest
    container_name: tdarr
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    environment:
      PUID: ${PUID}
      PGID: ${PGID}
      TZ: ${TZ}
      UMASK_SET: 002
      serverIP: 0.0.0.0
      serverPort: 8266
      webUIPort: 8265
      internalNode: "true"
      inContainer: "true"
      ffmpegVersion: 6
      nodeName: MainNode
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: all
    volumes:
      - ${DOCKER_BASE_DIR}/tdarr/server:/app/server
      - ${DOCKER_BASE_DIR}/tdarr/configs:/app/configs
      - ${DOCKER_BASE_DIR}/tdarr/logs:/app/logs
      - ${DOCKER_MEDIA_DIR}:/media
      - ${DOCKER_BASE_DIR}/tdarr/transcode_cache:/temp
    networks:
      - media-stack
    ports:
      - "8265:8265"  # WebUI
      - "8266:8266"  # Server
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8265"]
      interval: 1m
      timeout: 10s
      retries: 3
      start_period: 60s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 8G
        reservations:
          memory: 1G
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    profiles:
      - tdarr
