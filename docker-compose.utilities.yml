# ~/media-stack/docker-compose.utilities.yml
# Contains utility services: Homarr, Speedtest Tracker, Scrutiny, and Dozzle

x-common-env: &common-env
  PUID: ${PUID}
  PGID: ${PGID}
  TZ: ${TZ}

x-service-defaults: &service-defaults
  restart: unless-stopped
  init: true
  security_opt:
    - no-new-privileges:true
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "3"

x-healthcheck-defaults: &healthcheck-defaults
  interval: 30s
  timeout: 10s
  retries: 3
  start_period: 30s

x-resources-small: &resources-small
  deploy:
    resources:
      limits:
        cpus: '0.5'
        memory: 256M
      reservations:
        memory: 64M

x-resources-medium: &resources-medium
  deploy:
    resources:
      limits:
        cpus: '1'
        memory: 512M
      reservations:
        memory: 128M

services:
  # Homarr - Application dashboard with browser-managed boards
  homarr:
    <<: [*service-defaults, *resources-small]
    image: ghcr.io/homarr-labs/homarr:latest
    container_name: homarr
    environment:
      TZ: ${TZ}
      SECRET_ENCRYPTION_KEY: ${HOMARR_SECRET_ENCRYPTION_KEY}
      DOCKER_HOSTNAMES: docker-socket-proxy
      DOCKER_PORTS: 2375
    volumes:
      - ${DOCKER_BASE_DIR}/homarr/appdata:/appdata
    networks:
      - media-stack
    ports:
      - "3002:7575"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:7575/"]
      <<: *healthcheck-defaults
      start_period: 30s
    depends_on:
      docker-socket-proxy:
        condition: service_healthy
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
      - "pangolin.public-resources.homepage.name=Homarr"
      - "pangolin.public-resources.homepage.protocol=http"
      - "pangolin.public-resources.homepage.full-domain=${DOMAIN_NAME:-localhost}"
      - "pangolin.public-resources.homepage.auth.sso-enabled=true"
      - "pangolin.public-resources.homepage.targets[0].hostname=homarr"
      - "pangolin.public-resources.homepage.targets[0].method=http"
      - "pangolin.public-resources.homepage.targets[0].port=7575"
      - "pangolin.public-resources.homepage.targets[0].healthcheck.hostname=homarr"
      - "pangolin.public-resources.homepage.targets[0].healthcheck.port=7575"
      - "pangolin.public-resources.homepage.targets[0].healthcheck.path=/"
      - "pangolin.public-resources.homepage.targets[0].healthcheck.status=200"

  # Speedtest Tracker - Track internet speed over time
  speedtest-tracker:
    <<: [*service-defaults, *resources-medium]
    image: lscr.io/linuxserver/speedtest-tracker:latest
    container_name: speedtest-tracker
    init: false
    environment:
      <<: *common-env
      DB_CONNECTION: sqlite
      SPEEDTEST_SCHEDULE: "0 */4 * * *"
      PRUNE_RESULTS_OLDER_THAN: 365
    volumes:
      - ${DOCKER_BASE_DIR}/speedtest-tracker:/config
    networks:
      - media-stack
    ports:
      - "8765:80"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/api/healthcheck"]
      <<: *healthcheck-defaults
      start_period: 60s
    labels:
      - "com.centurylinklabs.watchtower.enable=false"
      - "pangolin.public-resources.speedtest-tracker.name=Speedtest Tracker"
      - "pangolin.public-resources.speedtest-tracker.protocol=http"
      - "pangolin.public-resources.speedtest-tracker.full-domain=${SPEEDTEST_SUBDOMAIN:-speedtest}.${DOMAIN_NAME:-localhost}"
      - "pangolin.public-resources.speedtest-tracker.auth.sso-enabled=true"
      - "pangolin.public-resources.speedtest-tracker.targets[0].hostname=speedtest-tracker"
      - "pangolin.public-resources.speedtest-tracker.targets[0].method=http"
      - "pangolin.public-resources.speedtest-tracker.targets[0].port=80"
      - "pangolin.public-resources.speedtest-tracker.targets[0].healthcheck.hostname=speedtest-tracker"
      - "pangolin.public-resources.speedtest-tracker.targets[0].healthcheck.port=80"
      - "pangolin.public-resources.speedtest-tracker.targets[0].healthcheck.path=/api/healthcheck"
      - "pangolin.public-resources.speedtest-tracker.targets[0].healthcheck.status=200"
    profiles:
      - speedtest

  # Scrutiny - S.M.A.R.T disk health monitoring
  scrutiny:
    <<: [*service-defaults, *resources-medium]
    image: ghcr.io/analogj/scrutiny:master-omnibus
    container_name: scrutiny
    cap_add:
      - SYS_RAWIO
    environment:
      TZ: ${TZ}
    volumes:
      - ${DOCKER_BASE_DIR}/scrutiny:/opt/scrutiny/config
      - ${DOCKER_BASE_DIR}/scrutiny/influxdb:/opt/scrutiny/influxdb
      - /run/udev:/run/udev:ro
    networks:
      - media-stack
    ports:
      - "8082:8080"
    # Add host-specific disk mappings in docker-compose.local.yml.
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 1m
      timeout: 10s
      retries: 3
      start_period: 30s
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
      - "pangolin.public-resources.scrutiny.name=Scrutiny"
      - "pangolin.public-resources.scrutiny.protocol=http"
      - "pangolin.public-resources.scrutiny.full-domain=${SCRUTINY_SUBDOMAIN:-scrutiny}.${DOMAIN_NAME:-localhost}"
      - "pangolin.public-resources.scrutiny.auth.sso-enabled=true"
      - "pangolin.public-resources.scrutiny.targets[0].hostname=scrutiny"
      - "pangolin.public-resources.scrutiny.targets[0].method=http"
      - "pangolin.public-resources.scrutiny.targets[0].port=8080"
      - "pangolin.public-resources.scrutiny.targets[0].healthcheck.hostname=scrutiny"
      - "pangolin.public-resources.scrutiny.targets[0].healthcheck.port=8080"
      - "pangolin.public-resources.scrutiny.targets[0].healthcheck.path=/api/health"
      - "pangolin.public-resources.scrutiny.targets[0].healthcheck.status=200"
    profiles:
      - scrutiny

  # Dozzle - Real-time Docker log viewer
  dozzle:
    <<: *service-defaults
    image: amir20/dozzle:latest
    container_name: dozzle
    environment:
      DOZZLE_LEVEL: info
      DOZZLE_TAILSIZE: 300
      DOZZLE_FILTER: "status=running"
      # Use Docker socket proxy instead of direct socket access
      DOCKER_HOST: tcp://docker-socket-proxy:2375
    networks:
      - media-stack
    ports:
      - "8889:8080"
    depends_on:
      docker-socket-proxy:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/dozzle", "healthcheck"]
      <<: *healthcheck-defaults
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128M
        reservations:
          memory: 32M
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
      - "pangolin.public-resources.dozzle.name=Dozzle"
      - "pangolin.public-resources.dozzle.protocol=http"
      - "pangolin.public-resources.dozzle.full-domain=${DOZZLE_SUBDOMAIN:-dozzle}.${DOMAIN_NAME:-localhost}"
      - "pangolin.public-resources.dozzle.auth.sso-enabled=true"
      - "pangolin.public-resources.dozzle.targets[0].hostname=dozzle"
      - "pangolin.public-resources.dozzle.targets[0].method=http"
      - "pangolin.public-resources.dozzle.targets[0].port=8080"
      - "pangolin.public-resources.dozzle.targets[0].healthcheck.hostname=dozzle"
      - "pangolin.public-resources.dozzle.targets[0].healthcheck.port=8080"
      - "pangolin.public-resources.dozzle.targets[0].healthcheck.path=/"
      - "pangolin.public-resources.dozzle.targets[0].healthcheck.status=200"
