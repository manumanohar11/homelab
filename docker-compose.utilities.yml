# ~/media-stack/docker-compose.utilities.yml
# Contains utility services: Homepage, Speedtest Tracker, Scrutiny, and Dozzle

x-common-env: &common-env
  PUID: ${PUID}
  PGID: ${PGID}
  TZ: ${TZ}

x-service-defaults: &service-defaults
  restart: unless-stopped
  security_opt:
    - no-new-privileges:true
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "3"

x-healthcheck-defaults: &healthcheck-defaults
  interval: 30s
  timeout: 10s
  retries: 3
  start_period: 30s

x-resources-small: &resources-small
  deploy:
    resources:
      limits:
        cpus: '0.5'
        memory: 256M
      reservations:
        memory: 64M

x-resources-medium: &resources-medium
  deploy:
    resources:
      limits:
        cpus: '1'
        memory: 512M
      reservations:
        memory: 128M

services:
  # Homepage - Application dashboard with service integration
  homepage:
    <<: [*service-defaults, *resources-small]
    image: ghcr.io/gethomepage/homepage:latest
    container_name: homepage
    environment:
      <<: *common-env
      # Allow access from all hosts (required for newer versions)
      HOMEPAGE_ALLOWED_HOSTS: "*"
      # Use Docker socket proxy instead of direct socket access
      DOCKER_HOST: tcp://docker-socket-proxy:2375
      # ---- API keys for Homepage service widgets ----
      # *Arr Suite
      HOMEPAGE_VAR_RADARR_API_KEY: ${RADARR_API_KEY:-}
      HOMEPAGE_VAR_SONARR_API_KEY: ${SONARR_API_KEY:-}
      HOMEPAGE_VAR_LIDARR_API_KEY: ${LIDARR_API_KEY:-}
      HOMEPAGE_VAR_BAZARR_API_KEY: ${BAZARR_API_KEY:-}
      HOMEPAGE_VAR_PROWLARR_API_KEY: ${PROWLARR_API_KEY:-}
      # Download Clients
      HOMEPAGE_VAR_QBITTORRENT_USER: ${QBITTORRENT_USERNAME:-admin}
      HOMEPAGE_VAR_QBITTORRENT_PASS: ${QBITTORRENT_PASSWORD:-}
      # Media Servers
      HOMEPAGE_VAR_PLEX_API_KEY: ${PLEX_API_KEY:-}
      HOMEPAGE_VAR_JELLYFIN_API_KEY: ${JELLYFIN_API_KEY:-}
      HOMEPAGE_VAR_TAUTULLI_API_KEY: ${TAUTULLI_API_KEY:-}
      HOMEPAGE_VAR_OVERSEERR_API_KEY: ${OVERSEERR_API_KEY:-}
      # Other Services
      HOMEPAGE_VAR_IMMICH_API_KEY: ${IMMICH_API_KEY:-}
      HOMEPAGE_VAR_PORTAINER_API_KEY: ${PORTAINER_API_KEY:-}
    volumes:
      - ${DOCKER_BASE_DIR}/homepage:/app/config
      - ${DOCKER_MEDIA_DIR}:/mnt/media:ro
    networks:
      - media-stack
    ports:
      - "3002:3000"
    depends_on:
      docker-socket-proxy:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000"]
      <<: *healthcheck-defaults
      start_period: 30s
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  # Speedtest Tracker - Track internet speed over time
  speedtest-tracker:
    <<: [*service-defaults, *resources-medium]
    image: lscr.io/linuxserver/speedtest-tracker:latest
    container_name: speedtest-tracker
    environment:
      <<: *common-env
      DB_CONNECTION: sqlite
      SPEEDTEST_SCHEDULE: "0 */4 * * *"
      PRUNE_RESULTS_OLDER_THAN: 365
    volumes:
      - ${DOCKER_BASE_DIR}/speedtest-tracker:/config
    networks:
      - media-stack
    ports:
      - "8765:80"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/api/healthcheck"]
      <<: *healthcheck-defaults
      start_period: 60s
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    profiles:
      - speedtest

  # Scrutiny - S.M.A.R.T disk health monitoring
  scrutiny:
    <<: [*service-defaults, *resources-medium]
    image: ghcr.io/analogj/scrutiny:master-omnibus
    container_name: scrutiny
    cap_add:
      - SYS_RAWIO
    environment:
      TZ: ${TZ}
    volumes:
      - ${DOCKER_BASE_DIR}/scrutiny:/opt/scrutiny/config
      - ${DOCKER_BASE_DIR}/scrutiny/influxdb:/opt/scrutiny/influxdb
      - /run/udev:/run/udev:ro
    networks:
      - media-stack
    ports:
      - "8082:8080"
    # Add host-specific disk mappings in docker-compose.local.yml.
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 1m
      timeout: 10s
      retries: 3
      start_period: 30s
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    profiles:
      - scrutiny

  # Dozzle - Real-time Docker log viewer
  dozzle:
    <<: *service-defaults
    image: amir20/dozzle:latest
    container_name: dozzle
    environment:
      DOZZLE_LEVEL: info
      DOZZLE_TAILSIZE: 300
      DOZZLE_FILTER: "status=running"
      # Use Docker socket proxy instead of direct socket access
      DOCKER_HOST: tcp://docker-socket-proxy:2375
    networks:
      - media-stack
    ports:
      - "8889:8080"
    depends_on:
      docker-socket-proxy:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/dozzle", "healthcheck"]
      <<: *healthcheck-defaults
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128M
        reservations:
          memory: 32M
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
