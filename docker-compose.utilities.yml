# ~/media-stack/docker-compose.utilities.yml
# Contains utility services: Homepage, Speedtest Tracker, Scrutiny, Dozzle, IT-Tools, Stirling PDF

services:
  # Homepage - Application dashboard with service integration
  homepage:
    image: ghcr.io/gethomepage/homepage:latest
    container_name: homepage
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    environment:
      PUID: ${PUID}
      PGID: ${PGID}
      TZ: ${TZ}
      # Use Docker socket proxy instead of direct socket access
      DOCKER_HOST: tcp://docker-socket-proxy:2375
      # API keys for service widgets (optional - set in .env file)
      HOMEPAGE_VAR_PLEX_API_KEY: ${PLEX_API_KEY:-}
      HOMEPAGE_VAR_TAUTULLI_API_KEY: ${TAUTULLI_API_KEY:-}
      HOMEPAGE_VAR_OVERSEERR_API_KEY: ${OVERSEERR_API_KEY:-}
      HOMEPAGE_VAR_RADARR_API_KEY: ${RADARR_API_KEY:-}
      HOMEPAGE_VAR_SONARR_API_KEY: ${SONARR_API_KEY:-}
      HOMEPAGE_VAR_BAZARR_API_KEY: ${BAZARR_API_KEY:-}
      HOMEPAGE_VAR_PROWLARR_API_KEY: ${PROWLARR_API_KEY:-}
      HOMEPAGE_VAR_QBITTORRENT_PASSWORD: ${QBITTORRENT_PASSWORD:-}
      HOMEPAGE_VAR_IMMICH_API_KEY: ${IMMICH_API_KEY:-}
      HOMEPAGE_VAR_PORTAINER_API_KEY: ${PORTAINER_API_KEY:-}
    volumes:
      - ${DOCKER_BASE_DIR}/homepage:/app/config
    networks:
      - media-stack
    ports:
      - "3002:3000"
    depends_on:
      docker-socket-proxy:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          memory: 64M
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
      - "homepage.group=Management"
      - "homepage.name=Homepage"
      - "homepage.icon=homepage"
      - "homepage.href=http://homepage.${DOMAIN_NAME:-localhost}:3002"
      - "homepage.description=Application Dashboard"

  # Speedtest Tracker - Track internet speed over time
  speedtest-tracker:
    image: lscr.io/linuxserver/speedtest-tracker:latest
    container_name: speedtest-tracker
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    environment:
      PUID: ${PUID}
      PGID: ${PGID}
      TZ: ${TZ}
      DB_CONNECTION: sqlite
      SPEEDTEST_SCHEDULE: "0 */4 * * *"
      PRUNE_RESULTS_OLDER_THAN: 365
    volumes:
      - ${DOCKER_BASE_DIR}/speedtest-tracker:/config
    networks:
      - media-stack
    ports:
      - "8765:80"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/api/healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          memory: 128M
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
      - "homepage.group=Monitoring"
      - "homepage.name=Speedtest Tracker"
      - "homepage.icon=speedtest-tracker"
      - "homepage.href=http://speedtest.${DOMAIN_NAME:-localhost}:8765"
      - "homepage.description=Internet Speed History"
    profiles:
      - speedtest

  # Scrutiny - S.M.A.R.T disk health monitoring
  scrutiny:
    image: ghcr.io/analogj/scrutiny:master-omnibus
    container_name: scrutiny
    restart: unless-stopped
    cap_add:
      - SYS_RAWIO
    environment:
      TZ: ${TZ}
    volumes:
      - ${DOCKER_BASE_DIR}/scrutiny:/opt/scrutiny/config
      - ${DOCKER_BASE_DIR}/scrutiny/influxdb:/opt/scrutiny/influxdb
      - /run/udev:/run/udev:ro
    networks:
      - media-stack
    ports:
      - "8082:8080"
    devices:
      # Detected disks on this system:
      # sda - 232.9G Samsung SSD 750 EVO 250GB
      # sdb - 3.6T ST4000VN008-2DR166
      # sdc - 931.5G ST1000DM010-2EP102
      - /dev/sda:/dev/sda
      - /dev/sdb:/dev/sdb
      - /dev/sdc:/dev/sdc
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 1m
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          memory: 128M
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
      - "homepage.group=Monitoring"
      - "homepage.name=Scrutiny"
      - "homepage.icon=scrutiny"
      - "homepage.href=http://scrutiny.${DOMAIN_NAME:-localhost}:8082"
      - "homepage.description=Disk Health Monitoring"
    profiles:
      - scrutiny

  # Dozzle - Real-time Docker log viewer
  dozzle:
    image: amir20/dozzle:latest
    container_name: dozzle
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    environment:
      DOZZLE_LEVEL: info
      DOZZLE_TAILSIZE: 300
      DOZZLE_FILTER: "status=running"
      # Use Docker socket proxy instead of direct socket access
      DOCKER_HOST: tcp://docker-socket-proxy:2375
    networks:
      - media-stack
    ports:
      - "8889:8080"
    depends_on:
      docker-socket-proxy:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/dozzle", "healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128M
        reservations:
          memory: 32M
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
      - "homepage.group=Management"
      - "homepage.name=Dozzle"
      - "homepage.icon=dozzle"
      - "homepage.href=http://dozzle.${DOMAIN_NAME:-localhost}:8889"
      - "homepage.description=Docker Log Viewer"

  # IT-Tools - Collection of handy online tools for developers
  it-tools:
    image: corentinth/it-tools:latest
    container_name: it-tools
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    networks:
      - media-stack
    ports:
      - "8083:80"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128M
        reservations:
          memory: 32M
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
      - "homepage.group=Utilities"
      - "homepage.name=IT Tools"
      - "homepage.icon=it-tools"
      - "homepage.href=http://tools.${DOMAIN_NAME:-localhost}:8083"
      - "homepage.description=Developer Tools"

  # Stirling PDF - PDF manipulation tools
  stirling-pdf:
    image: frooodle/s-pdf:latest
    container_name: stirling-pdf
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    environment:
      DOCKER_ENABLE_SECURITY: "false"
      INSTALL_BOOK_AND_ADVANCED_HTML_OPS: "false"
      LANGS: "en_US"
    volumes:
      - ${DOCKER_BASE_DIR}/stirling-pdf/training:/usr/share/tessdata
      - ${DOCKER_BASE_DIR}/stirling-pdf/configs:/configs
      - ${DOCKER_BASE_DIR}/stirling-pdf/logs:/logs
    networks:
      - media-stack
    ports:
      - "8084:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/v1/info/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          memory: 256M
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
      - "homepage.group=Utilities"
      - "homepage.name=Stirling PDF"
      - "homepage.icon=stirling-pdf"
      - "homepage.href=http://pdf.${DOMAIN_NAME:-localhost}:8084"
      - "homepage.description=PDF Tools"
