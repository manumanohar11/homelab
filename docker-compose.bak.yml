  #   image: kometateam/imagemaid
  #   container_name: imagemaid
  #   environment:
  #     - TZ=TIMEZONE #optional
  #   volumes:
  #     - ${DOCKER_BASE_DIR}/appdata/imagemaid:/config
  #     - /home/manohar/docker-config-files/plex:/plex
