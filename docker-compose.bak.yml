x-common-env: &common-env
  PUID: ${PUID:-1000}
  PGID: ${PGID:-1000}
  TZ: ${TZ:-Etc/UTC}

networks:
  media_stack_default:
    driver: bridge

services:
  # --- Portainer ---
  portainer:
    image: portainer/portainer-ce:latest
    container_name: portainer
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./portainer-data:/data
    ports:
      - 9000:9000

  # --- VPN and Core Network Services ---
  gluetun:
    image: qmcgaw/gluetun:latest
    container_name: gluetun
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    volumes:
      - ${DOCKER_BASE_DIR}/appdata/gluetun:/gluetun
    environment:
      - VPN_SERVICE_PROVIDER=${VPN_SERVICE_PROVIDER}
      - OPENVPN_USER=${OPENVPN_USER}
      - OPENVPN_PASSWORD=${OPENVPN_PASSWORD}
      - SERVER_REGIONS=${SERVER_REGIONS}
      - FIREWALL_OUTBOUND_SUBNETS=192.168.0.0/24
    ports:
      - "7878:7878" # Radarr
      - "8989:8989" # Sonarr
      - "9696:9696" # Prowlarr
      - "8080:8080" # qBittorrent WebUI
      - "6881:6881" # qBittorrent Torrenting TCP
      - "6881:6881/udp" # qBittorrent Torrenting UDP
      - "6767:6767" # Bazarr
      - "8686:8686" # Lidarr
      - "8191:8191" # Flaresolverr
      - "6969:6969" # Whisparr
    restart: unless-stopped

  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: flaresolverr
    network_mode: "service:gluetun"
    environment:
      LOG_LEVEL: "info"
      LOG_HTML: "false"
      CAPTCHA_SOLVER: "none"
      TZ: ${TZ:-Etc/UTC}
    depends_on:
      gluetun: { condition: service_healthy }
    restart: unless-stopped

  # --- Download Client ---
  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    network_mode: "service:gluetun"
    environment:
      <<: *common-env
      WEBUI_PORT: 8080
      TORRENTING_PORT: 6881
    volumes:
      - ${DOCKER_BASE_DIR}/appdata/qbittorrent:/config
      - ${DOCKER_BASE_DIR}/downloads:/downloads
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080"]
      interval: 1m
      timeout: 10s
      retries: 3
    depends_on:
      gluetun: { condition: service_healthy }
    restart: unless-stopped

  # --- Indexer Manager ---
  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    network_mode: "service:gluetun"
    environment:
      <<: *common-env
    volumes:
      - ${DOCKER_BASE_DIR}/appdata/prowlarr:/config
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9696/ping"]
      interval: 1m
      timeout: 10s
      retries: 3
    depends_on:
      gluetun: { condition: service_healthy }
    restart: unless-stopped

  # --- Media Management (*Arr Suite) ---
  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    network_mode: "service:gluetun"
    environment:
      <<: *common-env
    volumes:
      - ${DOCKER_BASE_DIR}/appdata/radarr:/config
      - ${DOCKER_MEDIA_DIR}/Movies:/movies_root # Radarr sees the main "Movies" folder
      - ${DOCKER_BASE_DIR}/downloads:/downloads
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7878/ping"]
      interval: 1m
      timeout: 10s
      retries: 3
    depends_on:
      gluetun: { condition: service_healthy }
      qbittorrent: { condition: service_healthy }
      prowlarr: { condition: service_healthy }
    restart: unless-stopped

  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    network_mode: "service:gluetun"
    environment:
      <<: *common-env
    volumes:
      - ${DOCKER_BASE_DIR}/appdata/sonarr:/config
      - '${DOCKER_MEDIA_DIR}/TV Shows:/tv_root' # Sonarr sees the main "TV Shows" folder
      - ${DOCKER_BASE_DIR}/downloads:/downloads
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8989/ping"]
      interval: 1m
      timeout: 10s
      retries: 3
    depends_on:
      gluetun: { condition: service_healthy }
      qbittorrent: { condition: service_healthy }
      prowlarr: { condition: service_healthy }
    restart: unless-stopped

  lidarr:
    image: lscr.io/linuxserver/lidarr:latest
    container_name: lidarr
    network_mode: "service:gluetun"
    environment:
      <<: *common-env
    volumes:
      - ${DOCKER_BASE_DIR}/appdata/lidarr:/config
      - ${DOCKER_MEDIA_DIR}/Songs:/music_library # Lidarr sees the main "Songs" folder
      - ${DOCKER_BASE_DIR}/downloads:/downloads
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8686/ping"]
      interval: 1m
      timeout: 10s
      retries: 3
    depends_on:
      gluetun: { condition: service_healthy }
      qbittorrent: { condition: service_healthy }
      prowlarr: { condition: service_healthy }
    restart: unless-stopped

  whisparr: # Assuming you might want a similar structure for adult content if used
    image: ghcr.io/hotio/whisparr:latest
    container_name: whisparr
    network_mode: "service:gluetun"
    environment:
      <<: *common-env
      UMASK: "002"
    volumes:
      - ${DOCKER_BASE_DIR}/appdata/whisparr:/config
      - ${DOCKER_MEDIA_DIR}/Adult:/adult_root # Example: if you have ${DOCKER_MEDIA_DIR}/Adult
      - ${DOCKER_BASE_DIR}/downloads:/downloads
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6969/ping"]
      interval: 1m
      timeout: 10s
      retries: 3
    depends_on:
      gluetun: { condition: service_healthy }
      qbittorrent: { condition: service_healthy }
      prowlarr: { condition: service_healthy }
    restart: unless-stopped

  bazarr:
    image: lscr.io/linuxserver/bazarr:latest
    container_name: bazarr
    network_mode: "service:gluetun"
    environment:
      <<: *common-env
    volumes:
      - ${DOCKER_BASE_DIR}/appdata/bazarr:/config
      - ${DOCKER_MEDIA_DIR}/Movies:/movies_root
      - '${DOCKER_MEDIA_DIR}/TV Shows:/tv_root'
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6767"]
      interval: 1m
      timeout: 10s
      retries: 3
    depends_on:
      gluetun: { condition: service_healthy }
      radarr: { condition: service_healthy }
      sonarr: { condition: service_healthy }
    restart: unless-stopped

  # --- Media Server ---
  jellyfin:
    image: lscr.io/linuxserver/jellyfin:latest
    container_name: jellyfin
    environment:
      <<: *common-env
      JELLYFIN_PublishedServerUrl: http://192.168.0.45:8096
    volumes:
      - ${DOCKER_BASE_DIR}/appdata/jellyfin:/config
      # Map the parent folders for each media type
      - ${DOCKER_MEDIA_DIR}/Movies:/data/movies_library
      - '${DOCKER_MEDIA_DIR}/TV Shows:/data/tv_library'
      - ${DOCKER_MEDIA_DIR}/Songs:/data/music_library
      - ${DOCKER_MEDIA_DIR}/Adult:/data/adult_library # If you use Whisparr and have this folder
    ports:
      - "8096:8096"
      - "8920:8920"
      - "7359:7359/udp"
      - "1900:1900/udp"
    networks:
      - media_stack_default
    dns:
      - 192.168.0.114 # Your Pi-hole IP
      - 1.1.1.1 # Fallback public DNS
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8096/health"]
      interval: 1m
      timeout: 10s
      retries: 3
    restart: unless-stopped
  homepage:
    image: ghcr.io/gethomepage/homepage:latest
    container_name: homepage
    environment:
      HOMEPAGE_ALLOWED_HOSTS: 192.168.0.45:3000
      PUID: 1000
      PGID: 1000
    ports:
      - 3000:3000
    volumes:
      - ${DOCKER_BASE_DIR}/appdata/homepage/config:/app/config # Make sure your local config directory exists
      - /var/run/docker.sock:/var/run/docker.sock:ro # optional, for docker integrations
    restart: unless-stopped

  plex:
    image: lscr.io/linuxserver/plex:latest
    container_name: plex
    network_mode: host
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Etc/UTC
      - VERSION=docker
      - PLEX_CLAIM= #optional
    volumes:
      - /home/manohar/docker-config-files/plex:/config
      - '${DOCKER_MEDIA_DIR}/TV Shows:/tv'
      - ${DOCKER_MEDIA_DIR}/Movies:/movies
      - '${DOCKER_MEDIA_DIR}/Music Videos:/music-videos'
      - ${DOCKER_MEDIA_DIR}/Songs:/music
    restart: unless-stopped
