      file: docker-compose.common.yml
      service: _vpn-service-large
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: flaresolverr
    environment:
      LOG_LEVEL: info
      LOG_HTML: 'false'
      CAPTCHA_SOLVER: none
      TZ: ${TZ}
    healthcheck:
      interval: 1m
      test:
      - CMD
      - curl
      - -f
      - http://localhost:8191/health
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G
        reservations:
          memory: 256M
    labels:
    - com.centurylinklabs.watchtower.enable=false
    - homepage.group=Downloaders
    - homepage.name=FlareSolverr
    - homepage.icon=flaresolverr
    - homepage.description=Cloudflare Bypass
    profiles:
    - arr
    - downloaders
  bitmagnet:
    extends:
      file: docker-compose.common.yml
      service: _vpn-service-large
    image: ghcr.io/bitmagnet-io/bitmagnet:latest
    container_name: bitmagnet
    environment:
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
      POSTGRES_PASSWORD: ${BITMAGNET_POSTGRES_PASSWORD:?set BITMAGNET_POSTGRES_PASSWORD in .env}
      TMDB_API_KEY: ${TMDB_API_KEY}
    volumes:
    - ${DOCKER_BASE_DIR}/bitmagnet:/root/.config/bitmagnet
    healthcheck:
      test:
      - CMD
      - wget
      - --no-verbose
      - --tries=1
      - --spider
      - http://localhost:3333
      interval: 1m
      start_period: 60s
    depends_on:
      bitmagnet-postgres:
        condition: service_healthy
    command:
    - worker
    - run
    - --keys=http_server
    - --keys=queue_server
    - --keys=dht_crawler
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          memory: 256M
    labels:
    - com.centurylinklabs.watchtower.enable=false
    - homepage.group=Downloaders
    - homepage.name=Bitmagnet
    - homepage.icon=bittorrent
    - homepage.href=https://${BITMAGNET_SUBDOMAIN:-bitmagnet}.${DOMAIN_NAME:-localhost}
    - homepage.description=DHT Crawler
    - pangolin.public-resources.bitmagnet.name=Bitmagnet
    - pangolin.public-resources.bitmagnet.protocol=http
    - pangolin.public-resources.bitmagnet.full-domain=${BITMAGNET_SUBDOMAIN:-bitmagnet}.${DOMAIN_NAME:-localhost}
    - pangolin.public-resources.bitmagnet.auth.sso-enabled=true
    - pangolin.public-resources.bitmagnet.targets[0].hostname=gluetun
    - pangolin.public-resources.bitmagnet.targets[0].method=http
    - pangolin.public-resources.bitmagnet.targets[0].port=3333
    - pangolin.public-resources.bitmagnet.targets[0].healthcheck.hostname=gluetun
    - pangolin.public-resources.bitmagnet.targets[0].healthcheck.port=3333
    - pangolin.public-resources.bitmagnet.targets[0].healthcheck.path=/
    - pangolin.public-resources.bitmagnet.targets[0].healthcheck.status=200
    profiles:
    - arr
    - downloaders
  bitmagnet-postgres:
    extends:
      file: docker-compose.common.yml
      service: _vpn-service-large
    image: postgres:16-alpine
    container_name: bitmagnet-postgres
    environment:
      POSTGRES_PASSWORD: ${BITMAGNET_POSTGRES_PASSWORD:?set BITMAGNET_POSTGRES_PASSWORD in .env}
      POSTGRES_DB: bitmagnet
      PGUSER: postgres
      POSTGRES_INITDB_ARGS: -c shared_buffers=256MB -c max_connections=200
    volumes:
    - bitmagnet_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
      - CMD-SHELL
      - pg_isready -U postgres -d bitmagnet
      start_period: 20s
      interval: 10s
      timeout: 5s
      retries: 5
    shm_size: 1g
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G
        reservations:
          memory: 256M
    labels:
    - homepage.group=Downloaders
    - homepage.name=Bitmagnet DB
    - homepage.description=PostgreSQL
    profiles:
    - arr
    - downloaders
  radarr:
