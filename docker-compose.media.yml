    - homepage.group=Media Management
    - homepage.name=Sonarr
    - homepage.icon=sonarr
    - homepage.href=https://${SONARR_SUBDOMAIN:-sonarr}.${DOMAIN_NAME:-localhost}
    - homepage.description=TV Show Management
    - pangolin.public-resources.sonarr.name=Sonarr
    - pangolin.public-resources.sonarr.protocol=http
    - pangolin.public-resources.sonarr.full-domain=${SONARR_SUBDOMAIN:-sonarr}.${DOMAIN_NAME:-localhost}
    - pangolin.public-resources.sonarr.auth.sso-enabled=true
    - pangolin.public-resources.sonarr.targets[0].hostname=gluetun
    - pangolin.public-resources.sonarr.targets[0].method=http
    - pangolin.public-resources.sonarr.targets[0].port=8989
    - pangolin.public-resources.sonarr.targets[0].healthcheck.hostname=gluetun
    - pangolin.public-resources.sonarr.targets[0].healthcheck.port=8989
    - pangolin.public-resources.sonarr.targets[0].healthcheck.path=/ping
    - pangolin.public-resources.sonarr.targets[0].healthcheck.status=200
    profiles:
    - arr
  lidarr:
    extends:
      file: docker-compose.common.yml
