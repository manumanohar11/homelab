  tdarr:
    extends:
      file: docker-compose.common.yml
      service: _lsio-large
    image: ghcr.io/haveagitgat/tdarr:latest
    container_name: tdarr
    init: true
    environment:
      UMASK_SET: 2
      serverIP: 0.0.0.0
      serverPort: 8266
      webUIPort: 8265
      internalNode: 'true'
      inContainer: 'true'
      ffmpegVersion: 6
      nodeName: MainNode
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: all
    volumes:
    - ${DOCKER_BASE_DIR}/tdarr/server:/app/server
    - ${DOCKER_BASE_DIR}/tdarr/configs:/app/configs
    - ${DOCKER_BASE_DIR}/tdarr/logs:/app/logs
    - ${DOCKER_MEDIA_DIR}:/media
    - ${DOCKER_BASE_DIR}/tdarr/transcode_cache:/temp
    networks:
    - media-stack
    ports:
    - 8265:8265
    - 8266:8266
    healthcheck:
      test:
      - CMD
      - curl
      - -f
      - http://localhost:8265
      interval: 1m
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 8G
        reservations:
          memory: 1G
          devices:
          - driver: nvidia
            count: 1
            capabilities:
            - gpu
    labels:
    - com.centurylinklabs.watchtower.enable=false
    - pangolin.public-resources.tdarr.name=Tdarr
    - pangolin.public-resources.tdarr.protocol=http
    - pangolin.public-resources.tdarr.full-domain=${TDARR_SUBDOMAIN:-tdarr}.${DOMAIN_NAME:-localhost}
    - pangolin.public-resources.tdarr.auth.sso-enabled=true
    - pangolin.public-resources.tdarr.targets[0].hostname=tdarr
    - pangolin.public-resources.tdarr.targets[0].method=http
    - pangolin.public-resources.tdarr.targets[0].port=8265
    - pangolin.public-resources.tdarr.targets[0].healthcheck.hostname=tdarr
    - pangolin.public-resources.tdarr.targets[0].healthcheck.port=8265
    - pangolin.public-resources.tdarr.targets[0].healthcheck.path=/
    - pangolin.public-resources.tdarr.targets[0].healthcheck.status=200
    profiles:
    - tdarr
