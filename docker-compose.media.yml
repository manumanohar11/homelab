      test:
      - CMD
      - curl
      - -f
      - http://localhost:8080
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          memory: 256M
    labels:
    - com.centurylinklabs.watchtower.enable=false
    - homepage.group=Downloaders
    - homepage.name=qBittorrent
    - homepage.icon=qbittorrent
    - homepage.href=https://${QBITTORRENT_SUBDOMAIN:-qbittorrent}.${DOMAIN_NAME:-localhost}
    - homepage.description=Torrent Client
    - pangolin.public-resources.qbittorrent.name=qBittorrent
    - pangolin.public-resources.qbittorrent.protocol=http
    - pangolin.public-resources.qbittorrent.full-domain=${QBITTORRENT_SUBDOMAIN:-qbittorrent}.${DOMAIN_NAME:-localhost}
    - pangolin.public-resources.qbittorrent.auth.sso-enabled=true
    - pangolin.public-resources.qbittorrent.targets[0].hostname=gluetun
    - pangolin.public-resources.qbittorrent.targets[0].method=http
    - pangolin.public-resources.qbittorrent.targets[0].port=8080
    - pangolin.public-resources.qbittorrent.targets[0].healthcheck.hostname=gluetun
    - pangolin.public-resources.qbittorrent.targets[0].healthcheck.port=8080
    - pangolin.public-resources.qbittorrent.targets[0].healthcheck.path=/
    - pangolin.public-resources.qbittorrent.targets[0].healthcheck.status=200
