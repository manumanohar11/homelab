    - pangolin.public-resources.radarr.targets[0].method=http
    - pangolin.public-resources.radarr.targets[0].port=7878
    - pangolin.public-resources.radarr.targets[0].healthcheck.hostname=gluetun
    - pangolin.public-resources.radarr.targets[0].healthcheck.port=7878
    - pangolin.public-resources.radarr.targets[0].healthcheck.path=/ping
    - pangolin.public-resources.radarr.targets[0].healthcheck.status=200
