- name: Home
  columns:
    - size: small
      widgets:
        - type: weather
          location: Kaikaluru, Andhra Pradesh, India
          units: metric
          hour-format: 12h
          hide-location: false
          show-area-name: true

        - type: clock
          hour-format: 12h
          timezones:
            - timezone: Asia/Kolkata
              label: India
            - timezone: America/Los_Angeles
              label: California
            - timezone: America/New_York
              label: New York
            - timezone: Europe/London
              label: London

        - type: calendar
          first-day-of-week: sunday
          hide-today: false

    - size: full
      widgets:
        - type: bookmarks
          title: Quick Access
          groups:
            - title: 🎬 Media Services
              color: 10 70 50
              links:
                - title: Jellyfin
                  url: https://jellyfin.manoharsolleti.com
                  icon: si:jellyfin
                - title: Plex
                  url: https://plex.manoharsolleti.com
                  icon: si:plex
                - title: Radarr
                  url: https://radarr.manoharsolleti.com
                  icon: si:radarr
                - title: Sonarr
                  url: https://sonarr.manoharsolleti.com
                  icon: si:sonarr
                - title: Prowlarr
                  url: https://prowlarr.manoharsolleti.com
                  icon: si:prowlarr
                - title: Bazarr
                  url: https://bazarr.manoharsolleti.com
                  icon: si:bazarr
                - title: Whisparr
                  url: https://whisparr.manoharsolleti.com
                - title: qBittorrent
                  url: https://qbittorrent.manoharsolleti.com
                  icon: si:qbittorrent

            - title: 🛠️ System Tools
              color: 200 50 50
              links:
                - title: Portainer
                  url: https://portainer.manoharsolleti.com
                  icon: si:portainer
                - title: Glances
                  url: https://glances.manoharsolleti.com
                  icon: si:grafana
                - title: Nextcloud
                  url: https://cloud.manoharsolleti.com
                  icon: si:nextcloud
                - title: Homepage
                  url: https://manoharsolleti.com
                  icon: si:home

        - type: monitor
          title: Service Health
          cache: 30s
          sites:
            - title: Jellyfin
              url: http://jellyfin:8096
              icon: si:jellyfin
            - title: Plex
              url: http://plex:32400
              icon: si:plex
            - title: Portainer
              url: https://portainer:9443
              icon: si:portainer
              allow-insecure: true
            - title: Nextcloud
              url: http://nextcloud:443
              icon: si:nextcloud

        - type: group
          title: News & Updates
          widgets:
            - type: rss
              title: Tech News
              limit: 5
              collapse-after: 3
              cache: 3h
              feeds:
                - url: https://techcrunch.com/feed/
                  title: TechCrunch
                - url: https://www.theverge.com/rss/index.xml
                  title: The Verge
                - url: https://arstechnica.com/feed/
                  title: Ars Technica

            - type: reddit
              subreddit: selfhosted
              limit: 5
              collapse-after: 3
              show-thumbnails: true

    - size: small
      widgets:
        - type: markets
          title: Markets
          markets:
            - symbol: SPY
              name: S&P 500
            - symbol: BTC-USD
              name: Bitcoin
            - symbol: ETH-USD
              name: Ethereum
            - symbol: NVDA
              name: NVIDIA
            - symbol: AAPL
              name: Apple
            - symbol: MSFT
              name: Microsoft
            - symbol: GOOGL
              name: Google
            - symbol: TSLA
              name: Tesla

        - type: twitch-channels
          title: Live Streams
          channels:
            - theprimeagen
            - ThePrimeTimeagen
            - teej_dv
            - rwxrob
            - melkey
            - cohhcarnage

        - type: releases
          title: Software Updates
          cache: 12h
          repositories:
            - glanceapp/glance
            - jellyfin/jellyfin
            - plexinc/pms-docker
            - containrrr/watchtower
            - qdm12/gluetun

