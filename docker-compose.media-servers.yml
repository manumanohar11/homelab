# ~/media-stack/docker-compose.media-servers.yml
# Contains media servers: Plex, Jellyfin, Stash, Kavita, Navidrome

x-common-env: &common-env
  PUID: ${PUID}
  PGID: ${PGID}
  TZ: ${TZ}

x-service-defaults: &service-defaults
  restart: unless-stopped
  security_opt:
    - no-new-privileges:true
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "3"

x-healthcheck-defaults: &healthcheck-defaults
  interval: 30s
  timeout: 10s
  retries: 3
  start_period: 30s

x-resources-medium: &resources-medium
  deploy:
    resources:
      limits:
        cpus: '2'
        memory: 1G
      reservations:
        memory: 256M

x-resources-stash: &resources-stash
  deploy:
    resources:
      limits:
        cpus: '4'
        memory: 4G
      reservations:
        memory: 512M

services:
  plex:
    <<: *service-defaults
    image: lscr.io/linuxserver/plex:latest
    container_name: plex
    environment:
      <<: *common-env
      VERSION: docker
      PLEX_CLAIM: ${PLEX_CLAIM:-}
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,video,utility
    volumes:
      - ${DOCKER_SSD_CONFIG_DIR}/plex:/config
      - ${DOCKER_MEDIA_DIR}:/data
    networks:
      - media-stack
    ports:
      - "32400:32400"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:32400/identity"]
      interval: 1m
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  jellyfin:
    <<: *service-defaults
    image: lscr.io/linuxserver/jellyfin:latest
    container_name: jellyfin
    environment:
      <<: *common-env
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,video,utility
    volumes:
      - ${DOCKER_BASE_DIR}/jellyfin:/config
      - ${JELLYFIN_MEDIA_DIR}:/data
    networks:
      - media-stack
    ports:
      - "8096:8096"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8096/health"]
      interval: 1m
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 4G
        reservations:
          memory: 1G
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    profiles:
      - jellyfin

  stash:
    <<: [*service-defaults, *resources-stash]
    image: stashapp/stash:latest
    container_name: stash
    network_mode: "service:gluetun"
    environment:
      <<: *common-env
      STASH_STASH: /data/
      STASH_GENERATED: /generated/
      STASH_METADATA: /metadata/
      STASH_CACHE: /cache/
      STASH_PORT: 9998
    volumes:
      - ${DOCKER_BASE_DIR}/stash/config:/root/.stash
      - ${DOCKER_MEDIA_DIR}:/data
      - ${DOCKER_BASE_DIR}/stash/metadata:/metadata
      - ${DOCKER_BASE_DIR}/stash/cache:/cache
      - ${DOCKER_BASE_DIR}/stash/blobs:/blobs
      - ${DOCKER_BASE_DIR}/stash/generated:/generated
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9998"]
      interval: 1m
      timeout: 10s
      retries: 3
      start_period: 30s
    depends_on:
      gluetun:
        condition: service_healthy
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    profiles:
      - stash

  # Kavita - Fast, feature-rich ebook/comic server
  kavita:
    <<: [*service-defaults, *resources-medium]
    image: lscr.io/linuxserver/kavita:latest
    container_name: kavita
    environment:
      <<: *common-env
    volumes:
      - ${DOCKER_BASE_DIR}/kavita:/config
      - ${DOCKER_MEDIA_DIR}/Audio Books:/audiobooks:ro
      - ${DOCKER_MEDIA_DIR}/Comics:/comics:ro
    networks:
      - media-stack
    ports:
      - "5000:5000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      <<: *healthcheck-defaults
      start_period: 30s
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    profiles:
      - kavita

  # Navidrome - Modern music server and streamer
  navidrome:
    <<: [*service-defaults, *resources-medium]
    image: deluan/navidrome:latest
    container_name: navidrome
    user: "${PUID}:${PGID}"
    environment:
      ND_SCANSCHEDULE: 1h
      ND_LOGLEVEL: info
      ND_SESSIONTIMEOUT: 24h
      ND_BASEURL: ""
      ND_ENABLETRANSCODINGCONFIG: "true"
      ND_ENABLESHARING: "true"
      ND_ENABLEFAVOURITES: "true"
      ND_ENABLESTARRATING: "true"
      ND_DEFAULTTHEME: "Dark"
    volumes:
      - ${DOCKER_BASE_DIR}/navidrome:/data
      - ${DOCKER_MEDIA_DIR}/Songs:/music:ro
    networks:
      - media-stack
    ports:
      - "4533:4533"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:4533/ping"]
      <<: *healthcheck-defaults
      start_period: 30s
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    profiles:
      - navidrome
