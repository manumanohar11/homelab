# ~/media-stack/docker-compose.media-servers.yml
# Contains media servers: Plex, Jellyfin, Stash, Kavita, Navidrome

x-common-env: &common-env
  PUID: ${PUID}
  PGID: ${PGID}
  TZ: ${TZ}

x-service-defaults: &service-defaults
  restart: unless-stopped
  init: true
  security_opt:
    - no-new-privileges:true
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "3"

x-healthcheck-defaults: &healthcheck-defaults
  interval: 30s
  timeout: 10s
  retries: 3
  start_period: 30s

x-resources-medium: &resources-medium
  deploy:
    resources:
      limits:
        cpus: '2'
        memory: 1G
      reservations:
        memory: 256M

x-resources-stash: &resources-stash
  deploy:
    resources:
      limits:
        cpus: '4'
        memory: 4G
      reservations:
        memory: 512M

services:
  plex:
    <<: *service-defaults
    image: lscr.io/linuxserver/plex:latest
    container_name: plex
    init: false
    environment:
      <<: *common-env
      VERSION: docker
      PLEX_CLAIM: ${PLEX_CLAIM:-}
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,video,utility
    volumes:
      - ${DOCKER_SSD_CONFIG_DIR}/plex:/config
      - ${DOCKER_MEDIA_DIR}:/data
      # Set Plex's Transcoder temporary directory to /transcode in the Plex UI to keep temp I/O on faster storage.
      - ${PLEX_TRANSCODE_DIR:-${DOCKER_SSD_CONFIG_DIR}/plex-transcode}:/transcode
    networks:
      - media-stack
    ports:
      - "32400:32400"
      - "8324:8324"
      - "32469:32469"
      - "1900:1900/udp"
      - "32410:32410/udp"
      - "32412:32412/udp"
      - "32413:32413/udp"
      - "32414:32414/udp"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:32400/identity"]
      interval: 1m
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 4G
        reservations:
          memory: 1G
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    labels:
      - "com.centurylinklabs.watchtower.enable=false"
      - "pangolin.public-resources.plex.name=Plex"
      - "pangolin.public-resources.plex.protocol=http"
      - "pangolin.public-resources.plex.full-domain=${PLEX_SUBDOMAIN:-plex}.${DOMAIN_NAME:-localhost}"
      - "pangolin.public-resources.plex.auth.sso-enabled=true"
      - "pangolin.public-resources.plex.targets[0].hostname=plex"
      - "pangolin.public-resources.plex.targets[0].method=http"
      - "pangolin.public-resources.plex.targets[0].port=32400"
      - "pangolin.public-resources.plex.targets[0].healthcheck.hostname=plex"
      - "pangolin.public-resources.plex.targets[0].healthcheck.port=32400"
      - "pangolin.public-resources.plex.targets[0].healthcheck.path=/identity"
      - "pangolin.public-resources.plex.targets[0].healthcheck.status=200"

  jellyfin:
    <<: *service-defaults
    image: lscr.io/linuxserver/jellyfin:latest
    container_name: jellyfin
    init: false
    environment:
      <<: *common-env
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,video,utility
      JELLYFIN_PublishedServerUrl: ${JELLYFIN_PUBLISHED_SERVER_URL:-}
    volumes:
      - ${DOCKER_BASE_DIR}/jellyfin:/config
      # Jellyfin defaults transcodes under /config, so keep that subdirectory on faster storage.
      - ${JELLYFIN_TRANSCODE_DIR:-${DOCKER_SSD_CONFIG_DIR}/jellyfin-transcodes}:/config/transcodes
      - ${JELLYFIN_MEDIA_DIR}:/data
    networks:
      - media-stack
    ports:
      - "8096:8096"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8096/health"]
      interval: 1m
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 4G
        reservations:
          memory: 1G
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    labels:
      - "com.centurylinklabs.watchtower.enable=false"
      - "pangolin.public-resources.jellyfin.name=Jellyfin"
      - "pangolin.public-resources.jellyfin.protocol=http"
      - "pangolin.public-resources.jellyfin.full-domain=${JELLYFIN_SUBDOMAIN:-jellyfin}.${DOMAIN_NAME:-localhost}"
      - "pangolin.public-resources.jellyfin.auth.sso-enabled=true"
      - "pangolin.public-resources.jellyfin.targets[0].hostname=jellyfin"
      - "pangolin.public-resources.jellyfin.targets[0].method=http"
      - "pangolin.public-resources.jellyfin.targets[0].port=8096"
      - "pangolin.public-resources.jellyfin.targets[0].healthcheck.hostname=jellyfin"
      - "pangolin.public-resources.jellyfin.targets[0].healthcheck.port=8096"
      - "pangolin.public-resources.jellyfin.targets[0].healthcheck.path=/health"
      - "pangolin.public-resources.jellyfin.targets[0].healthcheck.status=200"
    profiles:
      - jellyfin

  stash:
    <<: [*service-defaults, *resources-stash]
    image: stashapp/stash:latest
    container_name: stash
    network_mode: "service:gluetun"
    environment:
      <<: *common-env
      STASH_STASH: /data/
      STASH_GENERATED: /generated/
      STASH_METADATA: /metadata/
      STASH_CACHE: /cache/
      STASH_PORT: 9998
    volumes:
      - ${DOCKER_BASE_DIR}/stash/config:/root/.stash
      - ${DOCKER_MEDIA_DIR}:/data
      - ${DOCKER_BASE_DIR}/stash/metadata:/metadata
      - ${DOCKER_BASE_DIR}/stash/cache:/cache
      - ${DOCKER_BASE_DIR}/stash/blobs:/blobs
      - ${DOCKER_BASE_DIR}/stash/generated:/generated
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9998"]
      interval: 1m
      timeout: 10s
      retries: 3
      start_period: 30s
    depends_on:
      gluetun:
        condition: service_healthy
    labels:
      - "com.centurylinklabs.watchtower.enable=false"
      - "pangolin.public-resources.stash.name=Stash"
      - "pangolin.public-resources.stash.protocol=http"
      - "pangolin.public-resources.stash.full-domain=${STASH_SUBDOMAIN:-stash}.${DOMAIN_NAME:-localhost}"
      - "pangolin.public-resources.stash.auth.sso-enabled=true"
      - "pangolin.public-resources.stash.targets[0].hostname=gluetun"
      - "pangolin.public-resources.stash.targets[0].method=http"
      - "pangolin.public-resources.stash.targets[0].port=9998"
      - "pangolin.public-resources.stash.targets[0].healthcheck.hostname=gluetun"
      - "pangolin.public-resources.stash.targets[0].healthcheck.port=9998"
      - "pangolin.public-resources.stash.targets[0].healthcheck.path=/"
      - "pangolin.public-resources.stash.targets[0].healthcheck.status=200"
    profiles:
      - stash

  # Kavita - Fast, feature-rich ebook/comic server
  kavita:
    <<: [*service-defaults, *resources-medium]
    image: lscr.io/linuxserver/kavita:latest
    container_name: kavita
    init: false
    environment:
      <<: *common-env
    volumes:
      - ${DOCKER_BASE_DIR}/kavita:/config
      - ${DOCKER_MEDIA_DIR}/Audio Books:/audiobooks:ro
      - ${DOCKER_MEDIA_DIR}/Comics:/comics:ro
    networks:
      - media-stack
    ports:
      - "5000:5000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      <<: *healthcheck-defaults
      start_period: 30s
    labels:
      - "com.centurylinklabs.watchtower.enable=false"
      - "pangolin.public-resources.kavita.name=Kavita"
      - "pangolin.public-resources.kavita.protocol=http"
      - "pangolin.public-resources.kavita.full-domain=${KAVITA_SUBDOMAIN:-kavita}.${DOMAIN_NAME:-localhost}"
      - "pangolin.public-resources.kavita.auth.sso-enabled=true"
      - "pangolin.public-resources.kavita.targets[0].hostname=kavita"
      - "pangolin.public-resources.kavita.targets[0].method=http"
      - "pangolin.public-resources.kavita.targets[0].port=5000"
      - "pangolin.public-resources.kavita.targets[0].healthcheck.hostname=kavita"
      - "pangolin.public-resources.kavita.targets[0].healthcheck.port=5000"
      - "pangolin.public-resources.kavita.targets[0].healthcheck.path=/api/health"
      - "pangolin.public-resources.kavita.targets[0].healthcheck.status=200"
    profiles:
      - kavita

  # Navidrome - Modern music server and streamer
  navidrome:
    <<: [*service-defaults, *resources-medium]
    image: deluan/navidrome:latest
    container_name: navidrome
    user: "${PUID}:${PGID}"
    environment:
      ND_SCANSCHEDULE: 1h
      ND_LOGLEVEL: info
      ND_SESSIONTIMEOUT: 24h
      ND_BASEURL: ""
      ND_ENABLETRANSCODINGCONFIG: "true"
      ND_ENABLESHARING: "true"
      ND_ENABLEFAVOURITES: "true"
      ND_ENABLESTARRATING: "true"
      ND_DEFAULTTHEME: "Dark"
    volumes:
      - ${DOCKER_BASE_DIR}/navidrome:/data
      - ${DOCKER_MEDIA_DIR}/Songs:/music:ro
    networks:
      - media-stack
    ports:
      - "4533:4533"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:4533/ping"]
      <<: *healthcheck-defaults
      start_period: 30s
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
      - "pangolin.public-resources.navidrome.name=Navidrome"
      - "pangolin.public-resources.navidrome.protocol=http"
      - "pangolin.public-resources.navidrome.full-domain=${NAVIDROME_SUBDOMAIN:-navidrome}.${DOMAIN_NAME:-localhost}"
      - "pangolin.public-resources.navidrome.auth.sso-enabled=true"
      - "pangolin.public-resources.navidrome.targets[0].hostname=navidrome"
      - "pangolin.public-resources.navidrome.targets[0].method=http"
      - "pangolin.public-resources.navidrome.targets[0].port=4533"
      - "pangolin.public-resources.navidrome.targets[0].healthcheck.hostname=navidrome"
      - "pangolin.public-resources.navidrome.targets[0].healthcheck.port=4533"
      - "pangolin.public-resources.navidrome.targets[0].healthcheck.path=/ping"
      - "pangolin.public-resources.navidrome.targets[0].healthcheck.status=200"
    profiles:
      - navidrome
