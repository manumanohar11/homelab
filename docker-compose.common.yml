# /mnt/g/docker/docker-compose.common.yml
# Shared compose helpers for the starter stack and optional bundles.

x-common-env: &common-env
  PUID: ${PUID}
  PGID: ${PGID}
  TZ: ${TZ}

x-lsio-env: &lsio-env
  <<: *common-env
  DOCKER_MODS: ""

x-security-opts: &security-opts
  - no-new-privileges:true

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

x-healthcheck-defaults: &healthcheck-defaults
  interval: 30s
  timeout: 10s
  retries: 3
  start_period: 30s

x-service-defaults: &service-defaults
  restart: unless-stopped
  init: true
  security_opt: *security-opts
  logging: *default-logging

x-resources-tiny: &resources-tiny
  deploy:
    resources:
      limits:
        cpus: "0.5"
        memory: 128M
      reservations:
        memory: 32M

x-resources-small: &resources-small
  deploy:
    resources:
      limits:
        cpus: "0.5"
        memory: 256M
      reservations:
        memory: 64M

x-resources-medium: &resources-medium
  deploy:
    resources:
      limits:
        cpus: "1"
        memory: 512M
      reservations:
        memory: 128M

x-resources-large: &resources-large
  deploy:
    resources:
      limits:
        cpus: "2"
        memory: 2G
      reservations:
        memory: 512M

x-default-healthcheck: &default-healthcheck
  test: ["CMD", "true"]
  <<: *healthcheck-defaults

x-vpn-depends-on: &vpn-depends-on
  gluetun:
    condition: service_healthy

x-arr-depends-on: &arr-depends-on
  gluetun:
    condition: service_healthy
  prowlarr:
    condition: service_healthy
  qbittorrent:
    condition: service_healthy

services:
  _service-tiny:
    <<: [*service-defaults, *resources-tiny]
    healthcheck: *default-healthcheck

  _service-small:
    <<: [*service-defaults, *resources-small]
    healthcheck: *default-healthcheck

  _service-medium:
    <<: [*service-defaults, *resources-medium]
    healthcheck: *default-healthcheck

  _service-large:
    <<: [*service-defaults, *resources-large]
    healthcheck: *default-healthcheck

  _lsio-small:
    <<: [*service-defaults, *resources-small]
    init: false
    environment: *lsio-env
    healthcheck: *default-healthcheck

  _lsio-medium:
    <<: [*service-defaults, *resources-medium]
    init: false
    environment: *lsio-env
    healthcheck: *default-healthcheck

  _lsio-large:
    <<: [*service-defaults, *resources-large]
    init: false
    environment: *lsio-env
    healthcheck: *default-healthcheck

  _vpn-service-small:
    <<: [*service-defaults, *resources-small]
    network_mode: "service:gluetun"
    depends_on: *vpn-depends-on
    healthcheck: *default-healthcheck

  _vpn-service-medium:
    <<: [*service-defaults, *resources-medium]
    network_mode: "service:gluetun"
    depends_on: *vpn-depends-on
    healthcheck: *default-healthcheck

  _vpn-service-large:
    <<: [*service-defaults, *resources-large]
    network_mode: "service:gluetun"
    depends_on: *vpn-depends-on
    healthcheck: *default-healthcheck

  _vpn-lsio-small:
    <<: [*service-defaults, *resources-small]
    init: false
    environment: *lsio-env
    network_mode: "service:gluetun"
    depends_on: *vpn-depends-on
    healthcheck: *default-healthcheck

  _vpn-lsio-medium:
    <<: [*service-defaults, *resources-medium]
    init: false
    environment: *lsio-env
    network_mode: "service:gluetun"
    depends_on: *vpn-depends-on
    healthcheck: *default-healthcheck

  _vpn-lsio-large:
    <<: [*service-defaults, *resources-large]
    init: false
    environment: *lsio-env
    network_mode: "service:gluetun"
    depends_on: *vpn-depends-on
    healthcheck: *default-healthcheck

  _arr-lsio-small:
    <<: [*service-defaults, *resources-small]
    init: false
    environment: *lsio-env
    network_mode: "service:gluetun"
    depends_on: *arr-depends-on
    healthcheck: *default-healthcheck

  _arr-lsio-medium:
    <<: [*service-defaults, *resources-medium]
    init: false
    environment: *lsio-env
    network_mode: "service:gluetun"
    depends_on: *arr-depends-on
    healthcheck: *default-healthcheck

  _arr-lsio-large:
    <<: [*service-defaults, *resources-large]
    init: false
    environment: *lsio-env
    network_mode: "service:gluetun"
    depends_on: *arr-depends-on
    healthcheck: *default-healthcheck
